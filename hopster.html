        function showLevelComplete(levelIndex, coinsCollected) {
            gameState.levelTimerRunning = false;
            const lvl = LEVELS[levelIndex];
            const total = lvl.coins.length;
            const earned = _calcStars(coinsCollected, levelIndex);

            // Save best stars
            const stars = _getLevelStars();
            if (earned > stars[levelIndex]) {
                stars[levelIndex] = earned;
                localStorage.setItem('hopsterLevelStars', JSON.stringify(stars));
            }
            // Unlock next level
            const unlocked = _getUnlockedLevels();
            if (levelIndex + 1 < LEVELS.length && !unlocked.includes(levelIndex + 1)) {
                unlocked.push(levelIndex + 1);
                localStorage.setItem('hopsterUnlockedLevels', JSON.stringify(unlocked));
            }
            // Permanently remove collected coins from this level
            const collectedIndices = _getCollectedCoins(levelIndex);
            gameState.levelCoins
                .filter(c => c.userData.collected)
                .forEach(c => collectedIndices.add(c.userData.coinIndex));
            _saveCollectedCoins(levelIndex, collectedIndices);

            // Add coins to wallet (only on level complete)
            gameState.totalCoins += coinsCollected;
            localStorage.setItem('hopsterTotalCoins', gameState.totalCoins);
            document.getElementById('walletCoins').textContent = gameState.totalCoins;
            document.getElementById('menuCoins').textContent = gameState.totalCoins;

            // Build star display with animation
            const starsEl = document.getElementById('lcStars');
            starsEl.innerHTML = [0,1,2].map((j, idx) =>
                `<span class="lcStar" style="color:${j<earned?'#ffd93d':'#444'};animation-delay:${idx*0.35}s">${j<earned?'★':'☆'}</span>`
            ).join('');
            // Play a chime for each earned star with a staggered delay
            for (let si = 0; si < earned; si++) {
                setTimeout(() => playStarSound(si), 350 + si * 350);
            }

            document.getElementById('lcCoins').textContent = `🪙 ${coinsCollected} / ${total} coins collected`;
            document.getElementById('lcCoinsAdded').textContent = coinsCollected > 0 ? `+${coinsCollected} added to your wallet!` : '';

            // Best time tracking
            const elapsed = gameState.levelElapsed;
            const key = 'hopsterBestTimes';
            let bestTimes = {};
            try { bestTimes = JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) {}
            const prev = bestTimes[String(levelIndex)];
            const isNewBest = !prev || elapsed < prev;
            if (isNewBest) {
                bestTimes[String(levelIndex)] = elapsed;
                try { localStorage.setItem(key, JSON.stringify(bestTimes)); } catch(e) {}
            }
            const timeEl = document.getElementById('lcTime');
            if (timeEl) {
                timeEl.textContent = `⏱ ${elapsed.toFixed(1)}s` + (isNewBest && prev ? '  🏆 New best!' : prev ? `  (best: ${prev.toFixed(1)}s)` : '  🏆 First clear!');
            }

            const isLast = levelIndex >= LEVELS.length - 1;
            const nextBtn = document.getElementById('lcNextBtn');
            nextBtn.textContent = isLast ? '🏠 MAIN MENU' : 'NEXT LEVEL →';
            nextBtn.onclick = isLast
                ? () => { document.getElementById('levelComplete').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden'); }
                : () => startLevel(levelIndex + 1);
            document.getElementById('lcRetryBtn').onclick = () => startLevel(levelIndex);

            document.getElementById('levelComplete').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('gfxGameBtn').classList.add('hidden');
            stopBgMusic();
        }

        // ── Coin system ───────────────────────────────────────────────────────────
        function spawnCoinParticles(x, y, z) {
            const count = 12;
            const mat = new THREE.MeshBasicMaterial({ color: 0xFFD700, transparent: true, opacity: 1.0 });
            for (let i = 0; i < count; i++) {
                const geom = new THREE.BoxGeometry(0.12, 0.12, 0.12);
                const mesh = new THREE.Mesh(geom, mat.clone());
                mesh.position.set(x, y, z);
                const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
                const speed = 2.5 + Math.random() * 2.5;
                mesh.userData.vx = Math.cos(angle) * speed;
                mesh.userData.vy = 2.0 + Math.random() * 2.0;
                mesh.userData.vz = Math.sin(angle) * speed;
                mesh.userData.life = 1.0;
                mesh.userData.decay = 1.4 + Math.random() * 0.8;
                scene.add(mesh);
                gameState.particles.push(mesh);
            }
        }

        function createLevelCoins(levelData) {
            let placed = 0;
            const permanent = _getCollectedCoins(gameState.currentLevel);

            levelData.coins.forEach((c, coinIndex) => {
                // Skip coins permanently collected in a previous run
                if (permanent.has(coinIndex)) return;

                // Check the lane for trees and nudge coin clear of any overlap
                const lane = gameState.lanes.find(l => l.index === c.laneIndex);
                const trees = (lane && lane.trees) || [];
                const candidates = [c.xOffset, c.xOffset + 1, c.xOffset - 1,
                                    c.xOffset + 2, c.xOffset - 2, c.xOffset + 1.5, c.xOffset - 1.5];
                let finalX = null;
                for (const x of candidates) {
                    if (Math.abs(x) > CONFIG.LANE_WIDTH / 2 - 0.8) continue;
                    if (!trees.some(tx => Math.abs(tx - x) < 0.6)) { finalX = x; break; }
                }
                if (finalX === null) return; // no clear spot, skip

                const coinGeom = new THREE.CylinderGeometry(0.22, 0.22, 0.08, 16);
                const coinMat  = new THREE.MeshStandardMaterial({
                    color: 0xFFD700, metalness: 0.6, roughness: 0.3,
                    emissive: new THREE.Color(0xFFAA00), emissiveIntensity: 0.4,
                });
                const coin = new THREE.Mesh(coinGeom, coinMat);
                coin.rotation.x = Math.PI / 2;
                const coinY = (lane && lane.type === 'water')
                    ? 0.25 + CONFIG.LOG_RADIUS + 0.45
                    : CONFIG.LANE_HEIGHT / 2 + 0.35;
                coin.position.set(finalX, coinY, -c.laneIndex);
                coin.userData.collected  = false;
                coin.userData.coinIndex  = coinIndex;
                coin.userData.laneIndex  = c.laneIndex;
                coin.userData.baseY      = coin.position.y;
                coin.userData.waveOffset = _rand() * Math.PI * 2;
                coin.castShadow = false;
                scene.add(coin);
                gameState.levelCoins.push(coin);
                placed++;
            });
            document.getElementById('lcHudTotal').textContent = placed;
            document.getElementById('lcHudCount').textContent = 0;
            document.getElementById('levelCoinHud').style.display = 'inline-block';
        }

        function updateLevelCoinHud() {
            document.getElementById('lcHudCount').textContent = gameState.coinsCollected;
        }

        function playCoinSound() {
            if (typeof audioContext === 'undefined' || _sfxMuted) return;
            _resumeAudioCtx();
            const osc  = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain); gain.connect(_sfxGain);
            osc.type = 'sine';
            const now = audioContext.currentTime;
            osc.frequency.setValueAtTime(660, now);
            osc.frequency.linearRampToValueAtTime(1100, now + 0.12);
            gain.gain.setValueAtTime(0.35, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.18);
            osc.start(now); osc.stop(now + 0.18);
        }

        function playWinSound() {
            if (typeof audioContext === 'undefined' || _sfxMuted) return;
            _resumeAudioCtx();
            const now = audioContext.currentTime;
            // Triumphant ascending fanfare: C5 E5 G5 C6
            const notes = [523.25, 659.25, 783.99, 1046.5];
            notes.forEach((freq, i) => {
                const osc  = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain); gain.connect(_sfxGain);
                osc.type = 'triangle';
                const t = now + i * 0.13;
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.4, t + 0.04);
                gain.gain.linearRampToValueAtTime(0.28, t + 0.12);
                gain.gain.linearRampToValueAtTime(0, t + 0.32);
                osc.start(t); osc.stop(t + 0.35);
            });
            // Final chord shimmer
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const osc  = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain); gain.connect(_sfxGain);
                osc.type = 'sine';
                const t = now + 0.55;
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0.22, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.6);
                osc.start(t); osc.stop(t + 0.65);
            });
        }

        function playStarSound(starIndex) {
            // starIndex: 0, 1, or 2 — plays a rising chime for each star
            if (typeof audioContext === 'undefined' || _sfxMuted) return;
            _resumeAudioCtx();
            const now  = audioContext.currentTime;
            const base = [880, 1046.5, 1318.5][starIndex] || 880;
            const osc  = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain); gain.connect(_sfxGain);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(base * 0.75, now);
            osc.frequency.linearRampToValueAtTime(base, now + 0.06);
            osc.frequency.linearRampToValueAtTime(base * 1.25, now + 0.18);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.linearRampToValueAtTime(0.25, now + 0.15);
            gain.gain.linearRampToValueAtTime(0, now + 0.28);
            osc.start(now); osc.stop(now + 0.3);
        }

        function levelComplete() {
            if (!gameState.isPlaying) return;
            gameState.isPlaying = false;
            gameState.isDead    = false;
            stopBgMusic();
            playWinSound();
            showLevelComplete(gameState.currentLevel, gameState.coinsCollected);
        }

        // ── Finish line lane visual ────────────────────────────────────────────────
        function createFinishLane(lane) {
            // Bright finish-line tile
            const mat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.9 });
            const ground = new THREE.Mesh(
                new THREE.BoxGeometry(CONFIG.LANE_WIDTH, CONFIG.LANE_HEIGHT, CONFIG.LANE_DEPTH), mat
            );
            ground.position.set(0, 0, lane.z);
            ground.receiveShadow = true;
            scene.add(ground);
            lane.meshes.push(ground);
            // Checkered pattern squares
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            for (let xi = -4; xi <= 4; xi++) {
                for (let zi = 0; zi < 1; zi++) {
                    if ((xi + zi) % 2 === 0) continue;
                    const sq = new THREE.Mesh(new THREE.BoxGeometry(1, 0.02, CONFIG.LANE_DEPTH), darkMat);
                    sq.position.set(xi * 1, CONFIG.LANE_HEIGHT / 2 + 0.01, lane.z);
                    scene.add(sq);
                    lane.meshes.push(sq);
                }
            }
            // "FINISH" sign posts
            const postMat = new THREE.MeshStandardMaterial({ color: 0xffff00, roughness: 0.8 });
            [-CONFIG.LANE_WIDTH/2 + 0.5, CONFIG.LANE_WIDTH/2 - 0.5].forEach(x => {
                const post = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 3, 8), postMat);
                post.position.set(x, 1.5, lane.z);
                scene.add(post);
                lane.meshes.push(post);
            });

            const bannerMat = new THREE.MeshStandardMaterial({ color: 0xff2222, roughness: 0.8 });
            const banner = new THREE.Mesh(new THREE.BoxGeometry(CONFIG.LANE_WIDTH, 0.15, 0.1), bannerMat);
            banner.position.set(0, 3.1, lane.z);
            scene.add(banner);
            lane.meshes.push(banner);
        }

        // ── startLevel — replaces startGame for level mode ────────────────────────
        function startLevel(levelIndex) {
            gameState.currentLevel = levelIndex;

            // Clean up existing level coins first
            if (gameState.levelCoins) {
                gameState.levelCoins.forEach(c => scene.remove(c));
            }
            gameState.levelCoins    = [];
            gameState.coinsCollected = 0;

            document.getElementById('levelSelect').classList.add('hidden');
            document.getElementById('levelComplete').classList.add('hidden');

            // Delegate to startGame which will read gameState.currentLevel
            startGame(levelIndex);
        }

        function startGame(levelIndex) {
            // Show loading screen immediately so the user sees feedback
            const loadingScreen = document.getElementById('loadingScreen');
            const loadingBar    = document.getElementById('loadingBar');
            const loadingPct    = document.getElementById('loadingPct');
            loadingScreen.style.display = 'flex';
            loadingBar.style.width = '0%';
            loadingPct.textContent = '0%';

            document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('gameover').classList.add('hidden');
            document.getElementById('gfxGameBtn').classList.remove('hidden');
            document.getElementById('fpsCounter').classList.remove('hidden');

            // Keep isPlaying FALSE during loading so the game loop doesn't call
            // generateLanes() and blow through all the work before we can show progress.
            gameState.isPlaying = false;
            gameState.isDead = false;
            gameState.score = 0;
            gameState.coinScore = 0;
            gameState.playerPos = { x: 0, z: 0 };
            gameState.cameraTarget = { x: 0, z: 0 };
            gameState.playerIsHopping = false;
            gameState.hopJustCompleted = false;
            gameState.duckOnLog = false;
            gameState.frogOnLog = false;
            gameState.frogDiving = false;
            gameState.frogLandedUntil = 0;
            gameState.isGliding = false;
            gameState.hopStartedFromWater = false;
            gameState.nextLaneIndex = 0;
            gameState.lastLaneType = null;
            gameState.firstPerson = false;
            gameState.fpFacing = 'forward';
            gameState.isLevelMode  = (levelIndex !== undefined);
            gameState.currentLevel = levelIndex !== undefined ? levelIndex : 0;
            applyLevelTheme(gameState.isLevelMode ? gameState.currentLevel : undefined);
            if (gameState.isLevelMode) _seedRand(gameState.currentLevel * 999983 + 12345);
            gameState.coinsCollected = 0;
            gameState.levelStartTime = 0;
            gameState.levelElapsed = 0;
            gameState.levelTimerRunning = false;
            const timerEl = document.getElementById('levelTimer');
            if (timerEl) timerEl.textContent = '';
            gameState.levelCoins.forEach(c => scene.remove(c));
            gameState.levelCoins = [];
            if (gameState.particles) {
                gameState.particles.forEach(p => scene.remove(p));
                gameState.particles = [];
            }
            if (player) player.visible = true;
            camera.fov = 50;
            camera.updateProjectionMatrix();

            // Reset player
            if (player) scene.remove(player);
            player = createPlayer();

            // Clear world
            gameState.lanes.forEach(lane => {
                lane.meshes.forEach(m => {
                    const idx = _waterObjects.indexOf(m);
                    if (idx !== -1) _waterObjects.splice(idx, 1);
                    scene.remove(m);
                });
                lane.cars.forEach(car => scene.remove(car.mesh));
                lane.logs.forEach(logGroup => logGroup.meshes.forEach(m => scene.remove(m)));
            });
            gameState.lanes = [];
            gameState.cars  = [];
            gameState.logs  = [];

            document.getElementById('score').textContent = '0';
            document.getElementById('best').textContent = `BEST: ${gameState.bestScore}`;
            document.getElementById('walletCoins').textContent = gameState.totalCoins;

            // Build lanes 2 at a time across frames so the progress bar animates
            // and the loading screen is clearly visible the whole time.
            const totalTarget = CONFIG.GENERATION_DISTANCE + 2;

            function loadStep() {
                if (gameState.isLevelMode) {
                    // Level mode: build from LEVELS data, 2 lanes per frame
                    const lvl = LEVELS[gameState.currentLevel];
                    for (let i = 0; i < 2 && gameState.nextLaneIndex < lvl.lanes.length; i++) {
                        const laneIdx = gameState.nextLaneIndex;
                        const laneCfg = lvl.lanes[laneIdx];
                        const laneZ   = -laneIdx;
                        const lane    = {
                            index: laneIdx,
                            type:  laneCfg.type,
                            z:     laneZ,
                            meshes: [], cars: [], logs: [],
                            levelConfig: laneCfg,
                        };
                        if (laneCfg.type === 'safe')   createSafeLane(lane);
                        else if (laneCfg.type === 'road')   createRoadLane(lane, laneCfg);
                        else if (laneCfg.type === 'water')  createWaterLane(lane, laneCfg);
                        else if (laneCfg.type === 'finish') createFinishLane(lane);
                        gameState.lanes.push(lane);
                        gameState.nextLaneIndex++;
                    }
                    const pct = Math.min(Math.round(gameState.nextLaneIndex / lvl.lanes.length * 100), 100);
                    loadingBar.style.width = pct + '%';
                    loadingPct.textContent = pct + '%';
                    const done = gameState.nextLaneIndex >= lvl.lanes.length;
                    if (!done) { requestAnimationFrame(loadStep); return; }
                    // All lanes built — place coins
                    gameState.levelFinishZ = -(lvl.lanes.length - 1);
                    createLevelCoins(lvl);
                } else {
                    // Infinite mode
                    const needed = (player ? player.position.z : 0) - CONFIG.GENERATION_DISTANCE;
                    for (let i = 0; i < 2; i++) {
                        if (gameState.lanes.length === 0 || gameState.lanes[gameState.lanes.length - 1].z > needed) {
                            const lane = createLane(gameState.nextLaneIndex);
                            gameState.lanes.push(lane);
                            gameState.nextLaneIndex++;
                        }
                    }
                    const pct = Math.min(Math.round(gameState.lanes.length / totalTarget * 100), 100);
                    loadingBar.style.width = pct + '%';
                    loadingPct.textContent = pct + '%';

                    const done = gameState.lanes.length > 0 &&
                                 gameState.lanes[gameState.lanes.length - 1].z <= needed;
                    if (!done) { requestAnimationFrame(loadStep); return; }
                } // end else infinite mode
                loadingBar.style.width = '100%';
                loadingPct.textContent = '100%';
                requestAnimationFrame(() => {
                    loadingScreen.style.display = 'none';
                    gameState.isPlaying = true;
                    startBgMusic();
                });
            }
            requestAnimationFrame(loadStep);
        }

        function showGameOverScreen(reason) {
            // In level mode, coins are only awarded on level completion — not on death
            if (!gameState.isLevelMode) {
                gameState.totalCoins += gameState.coinScore;
                localStorage.setItem('hopsterTotalCoins', gameState.totalCoins);
                document.getElementById('walletCoins').textContent = gameState.totalCoins;
            }

            document.getElementById('gameover').classList.remove('hidden');
            document.getElementById('gfxGameBtn').classList.add('hidden');
            document.getElementById('deathCause').textContent = getDeathMessage(reason);
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalBest').textContent = gameState.bestScore;
            document.getElementById('finalCoins').textContent = gameState.isLevelMode
                ? `🪙 ${gameState.coinsCollected} collected (lost — finish the level to keep them!)`
                : `+${gameState.coinScore} (total: ${gameState.totalCoins})`;

            if (gameState.score > gameState.bestScore) {
                gameState.bestScore = gameState.score;
                localStorage.setItem('hopsterBestScore', gameState.bestScore);
                document.getElementById('finalBest').textContent = gameState.bestScore;
            }
        }

        // ============================================================================
        // AUDIO
        // ============================================================================
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // ── Master gain buses ────────────────────────────────────────────────
        const _sfxGain   = audioContext.createGain();   // SFX bus
        const _musicGain = audioContext.createGain();   // Music bus
        _sfxGain.gain.value   = 1.0;
        _musicGain.gain.value = 0.22;
        _sfxGain.connect(audioContext.destination);
        _musicGain.connect(audioContext.destination);

        let _musicMuted = false;
        let _sfxMuted   = false;

        function _resumeAudioCtx() {
            if (audioContext.state === 'suspended') audioContext.resume();
        }

        // Resume on first touch (iOS Safari requires user gesture)
        document.addEventListener('touchstart', _resumeAudioCtx, { once: true, passive: true });
        document.addEventListener('mousedown',  _resumeAudioCtx, { once: true });

        // ── SFX functions (route through _sfxGain) ───────────────────────────
        function playHopSound() {
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(_sfxGain);
            osc.frequency.value = 600;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.10, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        }

        function playDeathSound() {
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(_sfxGain);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        }

        function playChimeSound() {
            const now = audioContext.currentTime;
            const frequencies = [523.25, 659.25, 783.99];
            for (let i = 0; i < frequencies.length; i++) {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(_sfxGain);
                osc.frequency.value = frequencies[i];
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.2, now + i * 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.2);
                osc.start(now + i * 0.05);
                osc.stop(now + i * 0.05 + 0.2);
            }
        }

        // ── Procedural background music ──────────────────────────────────────
        // C major pentatonic chiptune · 128 BPM · triangle melody + sine bass
        // 32 bars (~60 s) across 8 sections before looping
        const _BPM    = 128;
        const _STEP   = 60 / _BPM / 4;     // 16th-note ≈ 0.117 s
        const _NSTEPS = 512;               // 32 bars × 16 steps
        const _LOOP   = _STEP * _NSTEPS;  // full loop ≈ 60 s

        // C major pentatonic — melody (C4–E5), bass (C3–A3)
        const _MEL_HZ  = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.26];
        const _BASS_HZ = [130.81, 146.83, 164.81, 196.00, 220.00];

        // 512-step sequences (index into freq arrays; -1 = rest)
        const _MEL_SEQ = [
            // ── A: Main hook (bars 1-4) ──────────────────────────────────
             2,-1, 3, 4,-1, 5, 4,-1, 3,-1, 2, 3, 4,-1, 5,-1, // 1
             4, 3,-1, 2, 3, 4,-1, 2, 1, 2, 3,-1, 4, 3, 2, 1, // 2
             2, 3, 5,-1, 6, 5, 4,-1, 5, 6, 7,-1, 6, 5, 4,-1, // 3
             4,-1, 3, 2,-1, 3, 4,-1, 2, 3,-1, 5, 4, 3, 2,-1, // 4
            // ── B: New motif / run (bars 5-8) ────────────────────────────
             5,-1, 7, 6,-1, 5, 4,-1, 5, 6, 7,-1, 5, 4,-1, 3, // 5
             4, 3, 2,-1, 3, 4,-1, 5, 4, 3, 2,-1, 3,-1, 2, 1, // 6
             2, 3, 4, 5, 4, 3, 2, 3, 4, 5, 6, 7, 6, 5, 4, 3, // 7
             4, 5,-1, 7,-1, 6, 5,-1, 4, 3,-1, 2,-1, 3, 4,-1, // 8
            // ── C: Contemplative walk (bars 9-12) ────────────────────────
             4,-1, 7,-1, 5,-1, 4,-1, 3,-1, 2,-1, 3,-1, 4,-1, // 9
             5,-1, 4,-1, 3,-1, 2,-1, 1,-1, 2,-1, 3,-1, 4,-1, // 10
             3,-1, 4,-1, 5,-1, 4,-1, 3,-1, 2,-1, 3,-1,-1,-1, // 11
             2,-1, 3,-1, 4,-1, 5,-1, 4,-1, 5,-1, 7,-1, 5,-1, // 12
            // ── D: Punchy rhythmic (bars 13-16) ──────────────────────────
             2, 3,-1, 4, 3,-1, 4,-1, 5,-1, 4, 3,-1, 4,-1,-1, // 13
             5, 4,-1, 3,-1, 2, 3, 4,-1, 5,-1, 6, 7,-1, 5, 4, // 14
             3,-1, 4,-1, 5, 6,-1, 7, 6,-1, 5,-1, 4,-1, 3,-1, // 15
             4,-1, 5,-1, 7,-1, 6, 5,-1, 4,-1, 3,-1, 2,-1,-1, // 16
            // ── E: Breakdown — sparse, atmospheric (bars 17-20) ──────────
            -1,-1, 2,-1,-1,-1, 3,-1,-1,-1, 4,-1,-1,-1, 5,-1, // 17
             4,-1,-1,-1, 3,-1,-1,-1, 2,-1,-1,-1, 3,-1,-1,-1, // 18
            -1,-1, 5,-1,-1,-1, 4,-1,-1,-1, 3,-1,-1,-1, 2,-1, // 19
             2,-1,-1, 3,-1, 4,-1,-1, 3,-1, 2,-1, 3,-1,-1,-1, // 20
            // ── F: Rebuild (bars 21-24) ───────────────────────────────────
             2, 3, 4,-1, 3, 4, 5,-1, 4, 5, 6,-1, 5, 4, 3,-1, // 21
             3, 4,-1, 5,-1, 6, 7,-1, 6,-1, 5, 4,-1, 3,-1, 2, // 22
             2,-1, 3, 4,-1, 5,-1, 6, 7,-1,-1, 6, 5,-1, 4,-1, // 23
             4, 5,-1, 6,-1, 7,-1,-1, 6, 5, 4,-1, 3,-1, 2,-1, // 24
            // ── G: Climax / full energy (bars 25-28) ─────────────────────
             2,-1, 3, 4, 5,-1, 4,-1, 3,-1, 2, 3, 4, 5,-1,-1, // 25
             5, 4,-1, 3, 4, 5,-1, 7, 6,-1, 5,-1, 4, 3,-1, 2, // 26
             2, 3, 5,-1, 6, 7,-1, 6, 5,-1, 4,-1, 3, 4, 5,-1, // 27
             4, 5, 6, 7,-1, 6, 5, 4,-1, 3,-1, 2,-1, 3,-1, 2, // 28
            // ── H: Outro — winding down (bars 29-32) ─────────────────────
             2,-1, 4,-1, 3,-1, 2,-1, 4,-1, 5,-1, 4,-1, 3,-1, // 29
             2,-1, 3,-1, 4,-1, 5,-1, 3,-1, 2,-1, 3,-1, 2,-1, // 30
             0,-1, 2,-1, 3,-1, 4,-1, 3,-1, 2,-1, 1,-1, 2,-1, // 31
             2,-1,-1,-1, 3,-1,-1,-1, 0,-1,-1,-1,-1,-1,-1,-1, // 32
        ];

        const _BASS_SEQ = [
            // A (bars 1-4)
             0,-1, 3,-1, 0,-1, 3,-1, 2,-1, 3,-1, 0,-1, 4,-1, // 1
             1,-1, 4,-1, 3,-1, 2,-1, 4,-1, 3,-1, 1,-1, 2,-1, // 2
             0,-1, 2,-1, 3,-1, 4,-1, 0,-1, 4,-1, 3,-1, 2,-1, // 3
             4,-1, 3,-1, 2,-1, 0,-1, 3,-1, 4,-1, 3,-1, 0,-1, // 4
            // B (bars 5-8)
             0,-1, 4,-1, 0,-1, 4,-1, 0,-1, 2,-1, 3,-1, 2,-1, // 5
             4,-1, 3,-1, 2,-1, 4,-1, 3,-1, 2,-1, 0,-1, 1,-1, // 6
             0,-1, 2,-1, 3,-1, 4,-1, 0,-1, 4,-1, 3,-1, 2,-1, // 7
             4,-1, 3,-1, 2,-1, 3,-1, 0,-1, 3,-1, 2,-1, 0,-1, // 8
            // C (bars 9-12)
             4,-1, 0,-1, 4,-1, 0,-1, 2,-1, 3,-1, 2,-1, 4,-1, // 9
             0,-1, 2,-1, 3,-1, 4,-1, 2,-1, 3,-1, 0,-1, 4,-1, // 10
             3,-1, 4,-1, 0,-1, 4,-1, 3,-1, 2,-1, 1,-1, 2,-1, // 11
             2,-1, 3,-1, 4,-1, 2,-1, 0,-1, 4,-1, 3,-1, 0,-1, // 12
            // D (bars 13-16)
             0,-1, 3,-1, 0,-1, 3,-1, 4,-1, 2,-1, 4,-1, 3,-1, // 13
             4,-1, 3,-1, 2,-1, 3,-1, 4,-1, 3,-1, 2,-1, 0,-1, // 14
             3,-1, 4,-1, 2,-1, 3,-1, 0,-1, 4,-1, 3,-1, 2,-1, // 15
             0,-1, 2,-1, 3,-1, 4,-1, 3,-1, 2,-1, 0,-1, 4,-1, // 16
            // E (bars 17-20) — half-time, wide gaps
             0,-1,-1,-1, 3,-1,-1,-1, 0,-1,-1,-1, 2,-1,-1,-1, // 17
             4,-1,-1,-1, 2,-1,-1,-1, 3,-1,-1,-1, 0,-1,-1,-1, // 18
             2,-1,-1,-1, 4,-1,-1,-1, 2,-1,-1,-1, 3,-1,-1,-1, // 19
             0,-1,-1,-1, 3,-1,-1,-1, 4,-1,-1,-1, 2,-1,-1,-1, // 20
            // F (bars 21-24)
             0,-1, 2,-1, 3,-1, 4,-1, 3,-1, 2,-1, 0,-1, 4,-1, // 21
             3,-1, 4,-1, 2,-1, 3,-1, 4,-1, 3,-1, 2,-1, 1,-1, // 22
             2,-1, 3,-1, 4,-1, 0,-1, 3,-1, 4,-1, 2,-1, 3,-1, // 23
             4,-1, 3,-1, 2,-1, 3,-1, 0,-1, 4,-1, 3,-1, 2,-1, // 24
            // G (bars 25-28)
             0,-1, 3,-1, 0,-1, 2,-1, 3,-1, 0,-1, 4,-1, 3,-1, // 25
             4,-1, 2,-1, 3,-1, 4,-1, 2,-1, 0,-1, 4,-1, 3,-1, // 26
             2,-1, 3,-1, 0,-1, 4,-1, 3,-1, 2,-1, 3,-1, 4,-1, // 27
             4,-1, 3,-1, 2,-1, 0,-1, 2,-1, 3,-1, 4,-1, 0,-1, // 28
            // H (bars 29-32)
             0,-1, 4,-1, 3,-1, 2,-1, 4,-1, 3,-1, 2,-1, 0,-1, // 29
             2,-1, 3,-1, 4,-1, 3,-1, 2,-1, 3,-1, 2,-1, 0,-1, // 30
             0,-1, 2,-1, 3,-1, 4,-1, 3,-1, 2,-1, 1,-1, 2,-1, // 31
             0,-1,-1,-1, 3,-1,-1,-1, 0,-1,-1,-1,-1,-1,-1,-1, // 32
        ];

        let _bgPlaying   = false;
        let _bgScheduler = null;
        let _bgOscillators = [];   // track all scheduled oscillators so we can kill them on stop

        function _scheduleLoop(loopStart) {
            if (!_bgPlaying) return;
            for (let s = 0; s < _NSTEPS; s++) {
                const t  = loopStart + s * _STEP;
                const mi = _MEL_SEQ[s];
                const bi = _BASS_SEQ[s];
                if (mi >= 0) {
                    const osc = audioContext.createOscillator();
                    const g   = audioContext.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = _MEL_HZ[mi];
                    g.gain.setValueAtTime(0.001, t);
                    g.gain.linearRampToValueAtTime(0.30, t + 0.012);
                    g.gain.exponentialRampToValueAtTime(0.001, t + _STEP * 0.78);
                    osc.connect(g); g.connect(_musicGain);
                    osc.start(t); osc.stop(t + _STEP * 0.82);
                    _bgOscillators.push(osc);
                }
                if (bi >= 0) {
                    const osc = audioContext.createOscillator();
                    const g   = audioContext.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = _BASS_HZ[bi];
                    g.gain.setValueAtTime(0.001, t);
                    g.gain.linearRampToValueAtTime(0.22, t + 0.018);
                    g.gain.exponentialRampToValueAtTime(0.001, t + _STEP * 0.88);
                    osc.connect(g); g.connect(_musicGain);
                    osc.start(t); osc.stop(t + _STEP * 0.92);
                    _bgOscillators.push(osc);
                }
            }
            // Re-schedule 80 ms before loop end for seamless repeat
            _bgScheduler = setTimeout(() => _scheduleLoop(loopStart + _LOOP), (_LOOP - 0.08) * 1000);
        }

        function startBgMusic() {
            if (_bgPlaying) return;
            _bgPlaying = true;
            _resumeAudioCtx();
            _musicGain.gain.cancelScheduledValues(audioContext.currentTime);
            _musicGain.gain.setValueAtTime(_musicMuted ? 0 : 0.22, audioContext.currentTime);
            _bgOscillators = [];
            _scheduleLoop(audioContext.currentTime + 0.15);
        }

        function stopBgMusic() {
            _bgPlaying = false;
            if (_bgScheduler) { clearTimeout(_bgScheduler); _bgScheduler = null; }
            // Stop every scheduled oscillator immediately so they can't bleed into the next session
            const now = audioContext.currentTime;
            _bgOscillators.forEach(osc => { try { osc.stop(now); } catch(e) {} });
            _bgOscillators = [];
            _musicGain.gain.cancelScheduledValues(now);
            _musicGain.gain.linearRampToValueAtTime(0, now + 0.08);
        }

        // ── Mute toggles ─────────────────────────────────────────────────────
        document.getElementById('sfxBtn').addEventListener('click', () => {
            _resumeAudioCtx();
            _sfxMuted = !_sfxMuted;
            _sfxGain.gain.value = _sfxMuted ? 0 : 1.0;
            const btn = document.getElementById('sfxBtn');
            btn.textContent = _sfxMuted ? '🔇' : '🔊';
            btn.style.background = _sfxMuted ? 'rgba(120,30,30,0.6)' : 'rgba(0,0,0,0.45)';
        });

        document.getElementById('musicBtn').addEventListener('click', () => {
            _resumeAudioCtx();
            _musicMuted = !_musicMuted;
            _musicGain.gain.value = _musicMuted ? 0 : 0.22;
            const btn = document.getElementById('musicBtn');
            btn.style.background = _musicMuted ? 'rgba(120,30,30,0.6)' : 'rgba(0,0,0,0.45)';
            btn.style.opacity = _musicMuted ? '0.6' : '1';
        });

        // ============================================================================
        // INPUT HANDLING
        // ============================================================================
        const keys = {};

        // First-person turning tables — 90-degree snaps
        const _FP_TURN_L  = { forward: 'left',  left: 'back',    back: 'right', right: 'forward' };
        const _FP_TURN_R  = { forward: 'right', right: 'back',   back: 'left',  left: 'forward'  };
        const _FP_ROT_Y   = { forward: 0, back: Math.PI, left: Math.PI / 2, right: -Math.PI / 2 };

        function _fpTurn(dir) {
            gameState.fpFacing = (dir === 'left' ? _FP_TURN_L : _FP_TURN_R)[gameState.fpFacing];
            if (player) player.rotation.y = _FP_ROT_Y[gameState.fpFacing];
        }

        window.addEventListener('keydown', (e) => {
            if (!gameState.isPlaying && !gameState.isDead) return;

            keys[e.key.toLowerCase()] = true;

            const key = e.key.toLowerCase();

            if (gameState.firstPerson) {
                // First-person: W/Up = move in facing direction, A/D = turn 90°, S = 180° turn
                if (key === 'w' || key === 'arrowup')    movePlayer(gameState.fpFacing);
                if (key === 'a' || key === 'arrowleft')  _fpTurn('left');
                if (key === 'd' || key === 'arrowright') _fpTurn('right');
                if (key === 's' || key === 'arrowdown')  { _fpTurn('left'); _fpTurn('left'); }
            } else {
                // Third-person: original grid controls
                if (key === 'w' || key === 'arrowup')    movePlayer('forward');
                if (key === 's' || key === 'arrowdown')  movePlayer('back');
                if (key === 'a' || key === 'arrowleft')  movePlayer('left');
                if (key === 'd' || key === 'arrowright') movePlayer('right');
            }

            // Camera mode is toggled via the Settings panel, not keyboard shortcuts
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Touch support
        window.addEventListener('touchstart', (e) => {
            if (!gameState.isPlaying && !gameState.isDead) {
                startGame();
                return;
            }
        });

        // ── Swipe / drag detection (touch + mouse) ───────────────────────
        let _swipeStartX = 0, _swipeStartY = 0, _swipePending = false;
        const SWIPE_MIN = 28; // px threshold

        function _onSwipeStart(x, y) {
            _swipeStartX = x; _swipeStartY = y; _swipePending = true;
        }
        function _onSwipeEnd(x, y) {
            if (!_swipePending || !gameState.isPlaying) { _swipePending = false; return; }
            _swipePending = false;
            const dx = x - _swipeStartX, dy = y - _swipeStartY;
            if (Math.abs(dx) < SWIPE_MIN && Math.abs(dy) < SWIPE_MIN) return; // too short
            if (gameState.firstPerson) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    _fpTurn(dx > 0 ? 'right' : 'left');
                } else {
                    if (dy < 0) movePlayer(gameState.fpFacing);
                    else movePlayer(_FP_TURN_L[_FP_TURN_L[gameState.fpFacing]]);
                }
            } else {
                if (Math.abs(dx) > Math.abs(dy)) {
                    movePlayer(dx > 0 ? 'right' : 'left');
                } else {
                    movePlayer(dy > 0 ? 'back' : 'forward');
                }
            }
        }

        // Touch
        window.addEventListener('touchstart', (e) => {
            _onSwipeStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        window.addEventListener('touchend', (e) => {
            _onSwipeEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
        });

        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) _onSwipeStart(e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) _onSwipeEnd(e.clientX, e.clientY);
        });

        // Render distance slider
        const RENDER_PRESETS = {
            1: { gen: 12, remove: 6,  label: 'Low'  },  // 12 lanes ahead
            2: { gen: 22, remove: 8,  label: 'Med'  },  // 22 lanes ahead (default)
            3: { gen: 40, remove: 10, label: 'High' },  // 40 lanes ahead
        };
        const renderSlider = document.getElementById('renderDist');
        const renderLabel  = document.getElementById('renderDistLabel');
        function applyRenderDist(val) {
            const p = RENDER_PRESETS[val];
            CONFIG.GENERATION_DISTANCE = p.gen;
            CONFIG.REMOVAL_DISTANCE    = p.remove;
            renderLabel.textContent    = p.label;
        }
        renderSlider.addEventListener('input', () => applyRenderDist(renderSlider.value));
        applyRenderDist(renderSlider.value); // apply default on load

        // Mobile controls toggle
        function applyMobileControls(val) {
            const dpad = document.getElementById('dpad');
            if (val === 'on') dpad.classList.add('show');
            else dpad.classList.remove('show');
            document.querySelectorAll('#mobileGroup .gfx-btn').forEach(b => {
                b.classList.toggle('gfx-active', b.dataset.val === val);
            });
        }
        document.querySelectorAll('#mobileGroup .gfx-btn').forEach(btn => {
            btn.addEventListener('click', () => applyMobileControls(btn.dataset.val));
        });

        // Auto-enable on touch devices
        if ('ontouchstart' in window) {
            applyMobileControls('on');
        }

        // ============================================================================
        // WINDOW RESIZE
        // ============================================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================================
        // GAME LOOP
        // ============================================================================
        // QUALITY MANAGEMENT (shared by manual buttons + auto-adjust)
        // ============================================================================
        const _QUALITY_NAMES = ['low', 'medium', 'high', 'ultra'];
        let _currentQLevel = 1;
        let _autoQualityOn  = true;

        function _resetShadow(size) {
            directionalLight.shadow.mapSize.set(size, size);
            if (directionalLight.shadow.map) {
                directionalLight.shadow.map.dispose();
                directionalLight.shadow.map = null;
            }
        }

        // Guard toneMapping assignment — Three.js r128 recompiles ALL shaders on change
        let _currentToneMapping = renderer.toneMapping;
        function _setToneMapping(tm, exposure) {
            if (renderer.toneMapping !== tm) {
                renderer.toneMapping = tm;
                _currentToneMapping  = tm;
            }
            renderer.toneMappingExposure = exposure;
        }

        function applyQualityPreset(nameOrLevel) {
            const q = (typeof nameOrLevel === 'number') ? _QUALITY_NAMES[nameOrLevel] : nameOrLevel;
            _currentQLevel = Math.max(0, _QUALITY_NAMES.indexOf(q));

            // Tone mapping stays ACES for all levels (varying exposure only) to avoid
            // shader recompile on every auto-quality step. Fog always present — even
            // ultra keeps light haze as a GPU draw-distance culling aid.
            let shadowsOn, shadowMapSize, fogDensity, fogBtn, toneExposure, rdVal;

            switch (q) {
                case 'low':
                    shadowsOn     = false;  shadowMapSize = 512;
                    fogDensity    = 0.030;  fogBtn = 'near';
                    toneExposure  = 0.95;   rdVal  = '1';
                    break;
                case 'medium':
                    shadowsOn     = true;   shadowMapSize = 1024;
                    fogDensity    = 0.015;  fogBtn = 'far';
                    toneExposure  = 1.00;   rdVal  = '2';
                    break;
                case 'high':
                    shadowsOn     = true;   shadowMapSize = 2048;
                    fogDensity    = 0.007;  fogBtn = 'far';
                    toneExposure  = 1.08;   rdVal  = '3';
                    break;
                case 'ultra':
                default:
                    shadowsOn     = true;   shadowMapSize = 4096;
                    fogDensity    = 0.004;  fogBtn = 'far';
                    toneExposure  = 1.15;   rdVal  = '3';
                    break;
            }

            // Apply shadows
            renderer.shadowMap.enabled  = shadowsOn;
            directionalLight.castShadow = shadowsOn;
            if (shadowsOn) _resetShadow(shadowMapSize);
            else if (directionalLight.shadow.map) {
                directionalLight.shadow.map.dispose();
                directionalLight.shadow.map = null;
            }

            // Apply fog (always present)
            scene.fog = new THREE.FogExp2(0xc9e8f5, fogDensity);

            // Apply tone mapping (guarded to avoid shader recompile when unchanged)
            _setToneMapping(THREE.ACESFilmicToneMapping, toneExposure);

            // Apply render distance
            applyRenderDist(parseInt(rdVal));

            // Sync ALL UI buttons
            document.querySelectorAll('#qualityGroup .gfx-btn').forEach(b =>
                b.classList.toggle('gfx-active', b.dataset.val === q));
            document.querySelectorAll('#shadowGroup .gfx-btn').forEach(b =>
                b.classList.toggle('gfx-active', b.dataset.val === (shadowsOn ? 'on' : 'off')));
            document.querySelectorAll('#fogGroup .gfx-btn').forEach(b =>
                b.classList.toggle('gfx-active', b.dataset.val === fogBtn));
            document.querySelectorAll('#tonemapGroup .gfx-btn').forEach(b =>
                b.classList.toggle('gfx-active', b.dataset.val === 'aces'));
            document.querySelectorAll('#renderDistGroup .gfx-btn').forEach(b =>
                b.classList.toggle('gfx-active', b.dataset.val === rdVal));
        }

        // FPS tracking
        let _fpsSamples = [];
        let _fpsLastSampleTime = Date.now();
        let _fpsDisplay = 60;
        let _lastAutoAdjust = 0;

        // ============================================================================
        let lastTime = Date.now();

        function gameLoop() {
            const now = Date.now();
            const deltaTime = (now - lastTime) / 1000;
            lastTime = now;

            if (gameState.isPlaying) {
                updatePlayerHop();
                updateWorldObjects(deltaTime);
                if (!gameState.isLevelMode) generateLanes();
                if (!gameState.isLevelMode) removeFarLanes();
                if (!gameState.isLevelMode) trimAheadLanes();
                checkCollisions(deltaTime);
                updateScore();
                updatePlayerVisuals();
            }


            updateCamera();

            // ── FPS counter + auto quality ────────────────────────────────
            const _fpsNow = Date.now();
            _fpsSamples.push(_fpsNow);
            // Keep only samples from the last 1 second
            while (_fpsSamples.length > 1 && _fpsNow - _fpsSamples[0] > 1000) _fpsSamples.shift();
            if (_fpsNow - _fpsLastSampleTime >= 500) {
                _fpsLastSampleTime = _fpsNow;
                const elapsed = _fpsNow - _fpsSamples[0];
                _fpsDisplay = elapsed > 0 ? Math.round((_fpsSamples.length - 1) * 1000 / elapsed) : 60;
                const el = document.getElementById('fpsCounter');
                el.textContent = _fpsDisplay + ' FPS';
                el.style.color = _fpsDisplay >= 50 ? '#88ff88' : _fpsDisplay >= 30 ? '#ffdd55' : '#ff6666';

                // Auto quality adjustment — only every 2.5 s to avoid thrashing
                if (_autoQualityOn && (_fpsNow - _lastAutoAdjust > 2500)) {
                    if (_fpsDisplay < 45 && _currentQLevel > 0) {
                        applyQualityPreset(_currentQLevel - 1);
                        _lastAutoAdjust = _fpsNow;
                    } else if (_fpsDisplay >= 55 && _currentQLevel < 3) {
                        applyQualityPreset(_currentQLevel + 1);
                        _lastAutoAdjust = _fpsNow;
                    }
                }
            }

            // Animate level coins + collect while riding logs
            if (gameState.isLevelMode && gameState.levelCoins) {
                const ct = Date.now() * 0.002;
                const px = player ? player.position.x : gameState.playerPos.x;
                const pz = gameState.playerPos.z;
                gameState.levelCoins.forEach(coin => {
                    if (!coin.userData.collected) {
                        coin.position.y = coin.userData.baseY + Math.sin(ct + coin.userData.waveOffset) * 0.08;
                        coin.rotation.z += 0.04;
                        // Collect if player drifts into coin (e.g. riding a log)
                        if (Math.abs(coin.position.x - px) < 0.7 &&
                            Math.abs(coin.position.z - pz) < 0.7) {
                            coin.userData.collected = true;
                            coin.visible = false;
                            gameState.coinsCollected++;
                            updateLevelCoinHud();
                            playCoinSound();
                            spawnCoinParticles(coin.position.x, coin.position.y, coin.position.z);
                        }
                    }
                });
            }

            // Update level timer
            if (gameState.isLevelMode && gameState.levelTimerRunning) {
                gameState.levelElapsed = (Date.now() - gameState.levelStartTime) / 1000;
                const timerEl = document.getElementById('levelTimer');
                if (timerEl) timerEl.textContent = gameState.levelElapsed.toFixed(1) + 's';
            }

            // Update particles
            if (gameState.particles && gameState.particles.length > 0) {
                const dt = Math.min(deltaTime, 0.05);
                for (let i = gameState.particles.length - 1; i >= 0; i--) {
                    const p = gameState.particles[i];
                    p.userData.life -= p.userData.decay * dt;
                    if (p.userData.life <= 0) {
                        scene.remove(p);
                        gameState.particles.splice(i, 1);
                    } else {
                        p.position.x += p.userData.vx * dt;
                        p.position.y += p.userData.vy * dt;
                        p.position.z += p.userData.vz * dt;
                        p.userData.vy -= 6 * dt; // gravity
                        p.material.opacity = p.userData.life;
                        p.rotation.x += 3 * dt;
                        p.rotation.z += 2 * dt;
                    }
                }
            }

            renderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }

        // ============================================================================
        // SKIN SHOP
        // ============================================================================
        const SKINS = [
            { id: 'chicken', name: 'Chicken', emoji: '🐔', price: 0,   desc: 'Default' },
            { id: 'bunny',   name: 'Bunny',   emoji: '🐰', price: 25,  desc: '25 🪙' },
            { id: 'fox',     name: 'Fox',     emoji: '🦊', price: 50,  desc: '50 🪙' },
            { id: 'duck',    name: 'Duck',    emoji: '🦆', price: 75,  desc: '75 🪙' },
            { id: 'frog',    name: 'Frog',    emoji: '🐸', price: 100, desc: '100 🪙' },
            { id: 'bear',    name: 'Bear',    emoji: '🐻', price: 125, desc: '125 🪙' },
        ];

        // Load persisted skin state
        let ownedSkins = JSON.parse(localStorage.getItem('hopsterOwnedSkins') || '["duck"]');
        let selectedSkin = localStorage.getItem('hopsterSelectedSkin') || 'chicken';
        if (!ownedSkins.includes('duck')) ownedSkins.push('duck');

        function saveSkinState() {
            localStorage.setItem('hopsterOwnedSkins', JSON.stringify(ownedSkins));
            localStorage.setItem('hopsterSelectedSkin', selectedSkin);
        }

        function openShop() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('shop').classList.remove('hidden');
            renderer.domElement.style.visibility = 'hidden';
            renderShop();
        }
        function closeShop() {
            document.getElementById('shop').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            renderer.domElement.style.visibility = 'visible';
            document.getElementById('menuCoins').textContent = gameState.totalCoins;
            document.getElementById('menuBestScore').textContent = gameState.bestScore;
        }

        function renderShop() {
            document.getElementById('shopCoins').textContent = gameState.totalCoins;
            const grid = document.getElementById('skinGrid');
            grid.innerHTML = '';
            SKINS.forEach(skin => {
                const owned  = ownedSkins.includes(skin.id);
                const active = selectedSkin === skin.id;
                const card   = document.createElement('div');
                card.className = 'skinCard' + (active ? ' active' : owned ? ' owned' : '');

                // Emoji preview
                const emojiEl = document.createElement('div');
                emojiEl.style.cssText = 'font-size:52px;line-height:1;';
                emojiEl.textContent = skin.emoji;

                const nameEl = document.createElement('div');
                nameEl.className = 'skinName';
                nameEl.textContent = skin.name;

                const priceEl = document.createElement('div');
                priceEl.className = 'skinPrice';
                priceEl.textContent = owned ? (active ? '✅ Equipped' : '✔ Owned') : skin.desc;

                const btn = document.createElement('button');
                btn.className = 'skinBtn';
                if (active) {
                    btn.textContent = 'Equipped';
                    btn.className += ' active';
                    btn.disabled = true;
                } else if (owned) {
                    btn.textContent = 'Equip';
                    btn.className += ' equip';
                    btn.onclick = () => { selectedSkin = skin.id; saveSkinState(); renderShop(); };
                } else {
                    btn.textContent = `Buy ${skin.desc}`;
                    btn.className += ' buy';
                    const canAfford = gameState.totalCoins >= skin.price;
                    if (!canAfford) btn.disabled = true;
                    btn.onclick = () => {
                        if (gameState.totalCoins < skin.price) return;
                        gameState.totalCoins -= skin.price;
                        localStorage.setItem('hopsterTotalCoins', gameState.totalCoins);
                        ownedSkins.push(skin.id);
                        selectedSkin = skin.id;
                        saveSkinState();
                        renderShop();
                    };
                }

                card.appendChild(emojiEl);
                card.appendChild(nameEl);
                card.appendChild(priceEl);
                card.appendChild(btn);
                grid.appendChild(card);
            });
        }

        document.getElementById('shopCloseBtn').addEventListener('click', closeShop);

        // ============================================================================
        // ============================================================================
        // OUTER SIDE WALLS — hide the car/log wrap zone on both sides of the world
        // ============================================================================
        {
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.95 });
            [-1, 1].forEach(side => {
                const wall = new THREE.Mesh(
                    new THREE.BoxGeometry(8, 6, 2108),
                    rockMat
                );
                // Centre the wall just outside the lane boundary, covering x = ±15 to ±19
                wall.position.set(side * (CONFIG.LANE_WIDTH / 2 + 4), 3, -1046);
                wall.receiveShadow = true;
                scene.add(wall);
            });
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        // Static ground slab behind the starting position so there's no void
        // behind the player. Covers z = 0 → +20 (player can never go past z = 0).
        (function addStartBackdrop() {
            const DEPTH = 20;
            const grassColors = [0x172e12, 0x142a10, 0x1a3113, 0x152c10, 0x1c3315];
            // Lay several 1-unit-wide strips so the colour varies naturally
            for (let i = 0; i < DEPTH; i++) {
                const col = grassColors[i % grassColors.length];
                const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 1.0, metalness: 0.0 });
                const slab = new THREE.Mesh(
                    new THREE.BoxGeometry(CONFIG.LANE_WIDTH, CONFIG.LANE_HEIGHT, 1),
                    mat
                );
                slab.position.set(0, 0, i + 0.5);   // z = 0.5, 1.5, 2.5 … 19.5
                slab.receiveShadow = true;
                scene.add(slab);
            }
        })();

        // Back wall so first-person players don't see the void when looking backward
        (function addBackWall() {
            const wallZ   = 8;             // right behind the starting position
            const wallW   = CONFIG.LANE_WIDTH + 8;  // wider than the lane so edges don't show
            const wallH   = 6;            // tall enough to fill 1st-person view at any FOV
            const wallD   = 1.2;

            // Main stone wall
            const stoneMat = new THREE.MeshStandardMaterial({ color: 0x5a6050, roughness: 0.97, metalness: 0.01 });
            const wall = new THREE.Mesh(new THREE.BoxGeometry(wallW, wallH, wallD), stoneMat);
            wall.position.set(0, wallH / 2, wallZ);
            wall.receiveShadow = true;
            wall.castShadow = true;
            scene.add(wall);

            // Dark mossy cap along the top
            const capMat = new THREE.MeshStandardMaterial({ color: 0x2a3820, roughness: 1.0, metalness: 0.0 });
            const cap = new THREE.Mesh(new THREE.BoxGeometry(wallW, 0.35, wallD + 0.2), capMat);
            cap.position.set(0, wallH + 0.175, wallZ);
            scene.add(cap);

            // Irregular bush/hedge clumps along the base for a natural look
            const bushColors = [0x1e3d18, 0x233f1c, 0x183520, 0x2a4a1e];
            for (let bx = -wallW / 2 + 1; bx < wallW / 2; bx += 2.2 + Math.random() * 0.8) {
                const bc = bushColors[Math.floor(Math.random() * bushColors.length)];
                const bMat = new THREE.MeshStandardMaterial({ color: bc, roughness: 1.0, metalness: 0.0 });
                const bh = 1.0 + Math.random() * 1.2;
                const bush = new THREE.Mesh(new THREE.SphereGeometry(0.7 + Math.random() * 0.4, 7, 5), bMat);
                bush.scale.set(1.1, bh * 0.7, 0.7);
                bush.position.set(bx, bh * 0.35, wallZ - wallD * 0.5);
                bush.castShadow = true;
                scene.add(bush);
            }
        })();

        showMenu();
        player = createPlayer();
        gameLoop();

        // ============================================================================
        // GRAPHICS SETTINGS PANEL
        // ============================================================================
        (function initGraphicsPanel() {
            // Track caller so we know where to return
            let _calledFromGame = false;

            function openGraphics(fromGame) {
                _calledFromGame = !!fromGame;
                const panel = document.getElementById('graphicsPanel');
                panel.classList.remove('hidden');
                // Menu: match main menu background; in-game: dark semi-transparent overlay
                panel.style.background = fromGame
                    ? 'rgba(0,0,0,0.82)'
                    : 'linear-gradient(160deg, #0a1628 0%, #1a3a2a 60%, #0d2a1a 100%)';
                if (!fromGame) {
                    document.getElementById('menu').classList.add('hidden');
                    renderer.domElement.style.visibility = 'hidden';
                }
                // Show leave button only when in-game
                document.getElementById('leaveGameBtn').classList.toggle('hidden', !fromGame);
            }
            function closeGraphics() {
                document.getElementById('graphicsPanel').classList.add('hidden');
                if (_calledFromGame) {
                    // Just hide panel, game stays running
                } else {
                    document.getElementById('menu').classList.remove('hidden');
                    renderer.domElement.style.visibility = 'visible';
                }
            }

            document.getElementById('graphicsBtn').addEventListener('click', () => openGraphics(false));
            document.getElementById('graphicsCloseBtn').addEventListener('click', closeGraphics);
            document.getElementById('gfxGameBtn').addEventListener('click', () => openGraphics(true));
            document.getElementById('leaveGameBtn').addEventListener('click', () => {
                document.getElementById('graphicsPanel').classList.add('hidden');
                gameState.isPlaying = false;
                gameState.isDead = true;
                showMenu();
            });

            // Helper: set active button in a group
            function setActive(groupId, val) {
                document.querySelectorAll(`#${groupId} .gfx-btn`).forEach(b => {
                    b.classList.toggle('gfx-active', b.dataset.val === val);
                });
            }

            // ── Quality preset ────────────────────────────────────────────
            // Auto quality starts on — begin at Medium, ramp up if FPS allows
            applyQualityPreset('medium');
            _lastAutoAdjust = Date.now();
            document.querySelectorAll('#qualityGroup .gfx-btn').forEach(btn => {
                btn.addEventListener('click', () => applyQualityPreset(btn.dataset.val));
            });

            // ── Shadows ───────────────────────────────────────────────────
            setActive('shadowGroup', 'on');
            document.querySelectorAll('#shadowGroup .gfx-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const v = btn.dataset.val;
                    setActive('shadowGroup', v);
                    renderer.shadowMap.enabled = (v === 'on');
                    directionalLight.castShadow = (v === 'on');
                    if (directionalLight.shadow.map) {
                        directionalLight.shadow.map.dispose();
                        directionalLight.shadow.map = null;
                    }
                });
            });

            // ── Fog distance ──────────────────────────────────────────────
            setActive('fogGroup', 'far');
            document.querySelectorAll('#fogGroup .gfx-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const v = btn.dataset.val;
                    setActive('fogGroup', v);
                    if (v === 'near')    scene.fog = new THREE.FogExp2(0xc9e8f5, 0.025);
                    else if (v === 'far') scene.fog = new THREE.FogExp2(0xc9e8f5, 0.006);
                    else                  scene.fog = null;
                });
            });

            // ── Pixel ratio ───────────────────────────────────────────────
            setActive('pixelGroup', 'native');
            document.querySelectorAll('#pixelGroup .gfx-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const v = btn.dataset.val;
                    setActive('pixelGroup', v);
                    renderer.setPixelRatio(v === '1' ? 1 : Math.min(window.devicePixelRatio || 1, 2));
                });
            });

            // ── Tone mapping ──────────────────────────────────────────────
            setActive('tonemapGroup', 'aces');
            document.querySelectorAll('#tonemapGroup .gfx-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const v = btn.dataset.val;
                    setActive('tonemapGroup', v);
                    renderer.toneMapping = (v === 'aces') ? THREE.ACESFilmicToneMapping : THREE.LinearToneMapping;
                    renderer.toneMappingExposure = (v === 'aces') ? 1.05 : 1.0;
                });
            });

            // ── Render distance ───────────────────────────────────────────
            setActive('renderDistGroup', '2');
            document.querySelectorAll('#renderDistGroup .gfx-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const v = btn.dataset.val;
                    setActive('renderDistGroup', v);
                    applyRenderDist(parseInt(v));
                });
            });

            // ── Auto quality ──────────────────────────────────────────────
            setActive('autoQualityGroup', 'on');
            document.querySelectorAll('#autoQualityGroup .gfx-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const v = btn.dataset.val;
                    setActive('autoQualityGroup', v);
                    _autoQualityOn = (v === 'on');
                    if (_autoQualityOn) {
                        applyQualityPreset('medium');
                        _lastAutoAdjust = Date.now();
                    }
                });
            });

            // ── Camera mode + FOV slider ──────────────────────────────────
            let _fpFov = 90; // persists between panel opens
            const fovSlider  = document.getElementById('fovSlider');
            const fovLabel   = document.getElementById('fovLabel');
            const fovRow     = document.getElementById('fovRow');

            function updateFovSliderTrack() {
                const pct = ((fovSlider.value - fovSlider.min) / (fovSlider.max - fovSlider.min) * 100).toFixed(1);
                fovSlider.style.setProperty('--fov-pct', pct + '%');
            }

            fovSlider.addEventListener('input', () => {
                _fpFov = parseInt(fovSlider.value);
                fovLabel.textContent = _fpFov + '°';
                updateFovSliderTrack();
                if (gameState.firstPerson) {
                    camera.fov = _fpFov;
                    camera.updateProjectionMatrix();
                }
            });

            function applyCamera(fp) {
                gameState.firstPerson = fp;
                gameState.fpFacing = 'forward';
                if (player) { player.rotation.y = 0; player.visible = !fp; }
                camera.fov = fp ? _fpFov : 50;
                camera.updateProjectionMatrix();
                fovRow.style.display = fp ? 'flex' : 'none';
                setActive('cameraGroup', fp ? 'first' : 'third');
            }

            setActive('cameraGroup', 'third');
            document.querySelectorAll('#cameraGroup .gfx-btn').forEach(btn => {
                btn.addEventListener('click', () => applyCamera(btn.dataset.val === 'first'));
            });

            // Sync panel state each time it opens
            const _gfxPanel = document.getElementById('graphicsPanel');
            new MutationObserver(() => {
                if (!_gfxPanel.classList.contains('hidden')) {
                    setActive('cameraGroup', gameState.firstPerson ? 'first' : 'third');
                    fovRow.style.display = gameState.firstPerson ? 'flex' : 'none';
                    fovSlider.value = _fpFov;
                    fovLabel.textContent = _fpFov + '°';
                    updateFovSliderTrack();
                }
            }).observe(_gfxPanel, { attributeFilter: ['class'] });
            updateFovSliderTrack();
        })();
    </script>
