        // ============================================================================
        // DIFFICULTY SCALING
        // Returns 0.0 (fresh start) → 1.0 (max difficulty, reached around lane 150)
        // ============================================================================
        function getDifficulty(laneIndex) {
            return Math.min(laneIndex / 150, 1.0);
        }

        // ============================================================================
        // WORLD GENERATION
        // ============================================================================
        function getLaneType(laneIndex) {
            // First 10 lanes are always safe — gentle on-ramp
            if (laneIndex < 10) return 'safe';

            // Fixed repeating pattern: [2 safe, 2 road, 2 safe, 3 water] = 9 lanes
            // Road sections and water sections never grow — only speed increases with depth
            const p = (laneIndex - 10) % 9;
            if (p < 2) return 'safe';
            if (p < 4) return 'road';
            if (p < 6) return 'safe';
            return 'water';   // p = 6, 7, 8
        }

        function createLane(laneIndex) {
            const type = getLaneType(laneIndex);
            const laneZ = -laneIndex;
            const lane = {
                index: laneIndex,
                type: type,
                z: laneZ,
                meshes: [],
                cars: [],
                logs: [],
            };

            if (type === 'safe') {
                // Don't put trees on the safe lane immediately before OR after a water section
                // — they block the player from stepping onto / off logs
                const prevType = laneIndex > 0 ? getLaneType(laneIndex - 1) : 'safe';
                const nextType = getLaneType(laneIndex + 1);
                const adjacentToWater = prevType === 'water' || nextType === 'water';
                createSafeLane(lane, adjacentToWater);
            } else if (type === 'road') {
                createRoadLane(lane);
            } else if (type === 'water') {
                createWaterLane(lane);
            }

            return lane;
        }

        // Shared rock material (created once, reused)
        const _rockMats = [
            new THREE.MeshStandardMaterial({ color: 0x787878, roughness: 0.9, metalness: 0.1 }),
            new THREE.MeshStandardMaterial({ color: 0x8a8470, roughness: 0.9, metalness: 0.1 }),
            new THREE.MeshStandardMaterial({ color: 0x6a6060, roughness: 0.9, metalness: 0.1 }),
        ];
        const _flowerColors = [0xff4466, 0xffcc00, 0xff8822, 0xee44cc, 0x88ddff];

        // ── Theme-specific decoration builders ───────────────────────────────
        function _buildBuilding(x, z, isNeon) {
            const group = new THREE.Group();
            const height = 3.5 + _rand() * 7;
            const w = 1.8 + _rand() * 2.2;
            const d = 1.6 + _rand() * 1.8;
            const bodyColor = isNeon
                ? [0x0a0818, 0x08101a, 0x100818][Math.floor(_rand()*3)]
                : [0x5a5a6a, 0x6a7080, 0x505060][Math.floor(_rand()*3)];
            const mat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.85 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(w, height, d), mat);
            body.position.y = height / 2;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            // Windows
            const rows = Math.max(2, Math.floor(height / 1.4));
            const cols = Math.max(1, Math.floor(w / 1.1));
            const neonPalette = [0xff00ff, 0x00ffff, 0xff8800, 0x8800ff];
            const cityPalette = [0xffffcc, 0xffffa0, 0xaaddff];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (_rand() < 0.65) {
                        const wc = isNeon
                            ? neonPalette[Math.floor(_rand()*neonPalette.length)]
                            : cityPalette[Math.floor(_rand()*cityPalette.length)];
                        const wMat = new THREE.MeshStandardMaterial({
                            color: wc, emissive: new THREE.Color(wc),
                            emissiveIntensity: isNeon ? 0.9 : 0.25
                        });
                        const win = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.45, 0.06), wMat);
                        win.position.set(
                            (c - (cols-1)/2) * (w/cols),
                            1.2 + r * 1.4,
                            d/2 + 0.02
                        );
                        group.add(win);
                    }
                }
            }
            group.position.set(x, 0, z);
            return group;
        }

        function _buildJunglePalm(x, z) {
            const group = new THREE.Group();
            const height = 3.5 + _rand() * 3.0;
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c3a18, roughness: 0.92 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.20, height, 8), trunkMat);
            trunk.position.y = height / 2;
            trunk.rotation.z = (_rand() - 0.5) * 0.3;
            trunk.castShadow = true;
            group.add(trunk);
            // Palm frond leaves
            const lMat = new THREE.MeshStandardMaterial({ color: 0x1a6b1a, roughness: 0.75 });
            const lMat2 = new THREE.MeshStandardMaterial({ color: 0x0d520d, roughness: 0.75 });
            const fronds = 6 + Math.floor(_rand() * 4);
            for (let i = 0; i < fronds; i++) {
                const angle = (i / fronds) * Math.PI * 2;
                const leaf = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.06, 2.2), i%2===0 ? lMat : lMat2);
                leaf.position.set(Math.cos(angle)*0.5, height + 0.05, Math.sin(angle)*0.5);
                leaf.rotation.y = angle;
                leaf.rotation.z = 0.5;
                group.add(leaf);
            }
            const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.55, 8, 6), lMat);
            tuft.scale.set(1.6, 0.5, 1.6);
            tuft.position.y = height - 0.1;
            group.add(tuft);
            group.position.set(x, 0, z);
            return group;
        }

        function _buildCactus(x, z) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x3a7a1a, roughness: 0.82 });
            const h = 1.8 + _rand() * 2.0;
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.26, h, 8), mat);
            trunk.position.y = h / 2;
            group.add(trunk);
            if (h > 2.2) {
                [-1, 1].forEach(side => {
                    const armBase = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.16, 0.75, 8), mat);
                    armBase.rotation.z = side * Math.PI / 2;
                    armBase.position.set(side * 0.5, h * 0.52, 0);
                    group.add(armBase);
                    const armUp = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.14, h * 0.38, 8), mat);
                    armUp.position.set(side * 0.9, h * 0.52 + h * 0.19, 0);
                    group.add(armUp);
                });
            }
            group.position.set(x, 0, z);
            return group;
        }

        function _buildAutumnTree(x, z) {
            const group = new THREE.Group();
            const h = 1.2 + _rand() * 1.2;
            const rT = 0.12 + _rand() * 0.08;
            const tMat = new THREE.MeshStandardMaterial({ color: 0x3d2010, roughness: 0.98 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(rT*0.65, rT, h, 8), tMat);
            trunk.position.y = h / 2; trunk.castShadow = true; group.add(trunk);
            const palette = [0xcc5500, 0xdd7700, 0xcc3300, 0xffaa00, 0xee4400, 0xbb2200];
            const c1 = palette[Math.floor(_rand()*palette.length)];
            const c2 = palette[Math.floor(_rand()*palette.length)];
            const fMat  = new THREE.MeshStandardMaterial({ color: c1, roughness: 0.8 });
            const fMat2 = new THREE.MeshStandardMaterial({ color: c2, roughness: 0.8 });
            const mR = 0.58 + _rand() * 0.28;
            const main = new THREE.Mesh(new THREE.SphereGeometry(mR, 10, 8), fMat);
            main.position.y = h + mR * 0.9; main.castShadow = true; group.add(main);
            for (let i = 0; i < 4 + Math.floor(_rand()*3); i++) {
                const ang = (i / 5) * Math.PI * 2;
                const br = mR * (0.45 + _rand() * 0.3);
                const bump = new THREE.Mesh(new THREE.SphereGeometry(br, 8, 7), i%2===0 ? fMat : fMat2);
                bump.position.set(Math.cos(ang)*mR*0.72, h + mR*0.5 + (_rand()-0.5)*mR*0.5, Math.sin(ang)*mR*0.72);
                bump.castShadow = true; group.add(bump);
            }
            group.position.set(x, 0, z);
            return group;
        }

        function _buildIcePine(x, z) {
            const group = new THREE.Group();
            const snowMat = new THREE.MeshStandardMaterial({ color: 0xd0e8f0, roughness: 0.4, metalness: 0.05 });
            const iceMat  = new THREE.MeshStandardMaterial({ color: 0x88bbdd, roughness: 0.1, metalness: 0.25, transparent: true, opacity: 0.88 });
            const tMat    = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.95 });
            if (_rand() > 0.35) {
                const h = 1.2 + _rand() * 1.0;
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.15, h, 8), tMat);
                trunk.position.y = h/2; group.add(trunk);
                for (let i = 0; i < 3; i++) {
                    const cR = (0.65 - i*0.17) * (0.9 + _rand()*0.25);
                    const cone = new THREE.Mesh(new THREE.ConeGeometry(cR, 0.75, 9), snowMat);
                    cone.position.y = h + 0.1 + i * 0.52; cone.castShadow = true; group.add(cone);
                }
            } else {
                const colH = 1.8 + _rand() * 2.2;
                const col = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.26, colH, 6), iceMat);
                col.position.y = colH / 2; group.add(col);
            }
            group.position.set(x, 0, z);
            return group;
        }

        function _buildLavaRock(x, z) {
            const group = new THREE.Group();
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x1a0800, roughness: 0.97 });
            const glowMat = new THREE.MeshStandardMaterial({
                color: 0xff3300, emissive: new THREE.Color(0xff2200), emissiveIntensity: 0.7, roughness: 0.5
            });
            const h = 0.9 + _rand() * 1.8;
            const w = 0.9 + _rand() * 1.2;
            const rock = new THREE.Mesh(new THREE.BoxGeometry(w, h, w*0.85), rockMat);
            rock.position.y = h/2; rock.rotation.y = _rand()*Math.PI; rock.castShadow = true; group.add(rock);
            const crack = new THREE.Mesh(new THREE.BoxGeometry(w*0.5, 0.18, 0.1), glowMat);
            crack.position.y = 0.09; group.add(crack);
            group.position.set(x, 0, z);
            return group;
        }

        function _buildIndustrialObj(x, z) {
            const group = new THREE.Group();
            const mat  = new THREE.MeshStandardMaterial({ color: 0x1a1a22, roughness: 0.92 });
            const rMat = new THREE.MeshStandardMaterial({ color: 0x441111, roughness: 0.85 });
            if (_rand() > 0.45) {
                const h = 3.0 + _rand() * 3.5;
                const stack = new THREE.Mesh(new THREE.CylinderGeometry(0.20, 0.28, h, 10), mat);
                stack.position.y = h/2; stack.castShadow = true; group.add(stack);
                const band = new THREE.Mesh(new THREE.CylinderGeometry(0.23, 0.23, 0.32, 10), rMat);
                band.position.y = h - 0.16; group.add(band);
            } else {
                const w = 1.2 + _rand()*1.0, h = 0.9 + _rand()*1.2;
                const tank = new THREE.Mesh(new THREE.CylinderGeometry(w*0.42, w*0.42, h, 12), mat);
                tank.rotation.z = Math.PI/2; tank.position.y = w*0.42; group.add(tank);
            }
            group.position.set(x, 0, z);
            return group;
        }

        function _buildDeadTree(x, z) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x141414, roughness: 0.96 });
            const h = 2.2 + _rand() * 2.2;
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.16, h, 6), mat);
            trunk.position.y = h/2; trunk.castShadow = true; group.add(trunk);
            const bCount = 3 + Math.floor(_rand()*4);
            for (let i = 0; i < bCount; i++) {
                const bL = 0.6 + _rand()*1.0;
                const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.07, bL, 5), mat);
                const ang = (i/bCount)*Math.PI*2 + _rand()*0.6;
                branch.position.set(Math.cos(ang)*bL*0.38, h*(0.45+_rand()*0.45), Math.sin(ang)*bL*0.38);
                branch.rotation.z = Math.cos(ang)*0.75; branch.rotation.x = Math.sin(ang)*0.75;
                group.add(branch);
            }
            group.position.set(x, 0, z);
            return group;
        }

        function _buildThemeDecoration(x, z) {
            if (!_currentTheme) return _buildTree(x, z, z);
            const fog = _currentTheme.fog;
            if (fog === 0x8899aa) return _buildBuilding(x, z, false);
            if (fog === 0x0a0a2a) return _buildBuilding(x, z, true);
            if (fog === 0x1a3a1a) return _buildJunglePalm(x, z);
            if (fog === 0xe8a850) return _buildCactus(x, z);
            if (fog === 0xd4844a) return _buildAutumnTree(x, z);
            if (fog === 0x9bb8d4) return _buildIcePine(x, z);
            if (fog === 0x3a1a00) return _buildLavaRock(x, z);
            if (fog === 0x221122) return _buildIndustrialObj(x, z);
            if (fog === 0x050505) return _buildDeadTree(x, z);
            return _buildTree(x, z, z);
        }

        function _buildTree(x, z, laneZ) {
            const group = new THREE.Group();
            const isPine = Math.random() > 0.45;
            const trunkH = 1.0 + Math.random() * 1.0;
            const trunkR  = 0.14 + Math.random() * 0.10;
            const trunkBark = new THREE.Color(
                0.28 + Math.random() * 0.12,
                0.16 + Math.random() * 0.08,
                0.06 + Math.random() * 0.04
            );
            const trunkMat = new THREE.MeshStandardMaterial({ color: trunkBark, roughness: 0.98, metalness: 0.0 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(trunkR * 0.65, trunkR, trunkH, 8), trunkMat);
            trunk.position.y = trunkH / 2;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);

            // Foliage color — rich dark greens with slight hue variation
            const gc = new THREE.Color(
                0.05 + Math.random() * 0.10,
                0.28 + Math.random() * 0.18,
                0.04 + Math.random() * 0.06
            );
            const fMat  = new THREE.MeshStandardMaterial({ color: gc, roughness: 0.90, metalness: 0.0 });
            const gc2   = gc.clone().multiplyScalar(0.72);
            const fMat2 = new THREE.MeshStandardMaterial({ color: gc2, roughness: 0.92, metalness: 0.0 });

            if (isPine) {
                // 3-tier conical pine
                for (let i = 0; i < 3; i++) {
                    const cR = (0.78 - i * 0.18) * (0.85 + Math.random() * 0.3);
                    const cH = 0.85 + Math.random() * 0.2;
                    const cone = new THREE.Mesh(new THREE.ConeGeometry(cR, cH, 9), i % 2 === 0 ? fMat : fMat2);
                    cone.position.y = trunkH + 0.15 + i * 0.60;
                    cone.castShadow = true;
                    group.add(cone);
                }
            } else {
                // Round leafy tree: main canopy + organic side bumps
                const mainR = 0.58 + Math.random() * 0.22;
                const main = new THREE.Mesh(new THREE.SphereGeometry(mainR, 10, 8), fMat);
                main.position.y = trunkH + mainR * 0.85;
                main.castShadow = true;
                group.add(main);
                const bumpCount = 3 + Math.floor(Math.random() * 3);
                for (let i = 0; i < bumpCount; i++) {
                    const ang = (i / bumpCount) * Math.PI * 2 + Math.random() * 0.5;
                    const br  = mainR * (0.48 + Math.random() * 0.28);
                    const bx  = Math.cos(ang) * mainR * 0.72;
                    const bz  = Math.sin(ang) * mainR * 0.72;
                    const by  = trunkH + mainR * 0.5 + (Math.random() - 0.5) * mainR * 0.6;
                    const bump = new THREE.Mesh(new THREE.SphereGeometry(br, 8, 7), i % 2 === 0 ? fMat : fMat2);
                    bump.position.set(bx, by, bz);
                    bump.castShadow = true;
                    group.add(bump);
                }
            }
            group.position.set(x, 0, laneZ);
            return group;
        }

        function createSafeLane(lane, adjacentToWater = false) {
            lane.trees = lane.trees || [];
            // Grass tile — varied green shade
            const grassHue = (_currentTheme && _currentTheme.ground) || [0x172e12, 0x142a10, 0x1a3113, 0x152c10, 0x1c3315];
            const col = grassHue[Math.floor(_rand() * grassHue.length)];
            const groundMat = new THREE.MeshStandardMaterial({ color: col, roughness: 1.0, metalness: 0.0 });
            const ground = new THREE.Mesh(
                new THREE.BoxGeometry(CONFIG.LANE_WIDTH, CONFIG.LANE_HEIGHT, CONFIG.LANE_DEPTH),
                groundMat
            );
            ground.position.set(0, 0, lane.z);
            ground.receiveShadow = true;
            scene.add(ground);
            lane.meshes.push(ground);

            // Scatter small rocks
            const rockCount = 1 + Math.floor(_rand() * 3);
            for (let r = 0; r < rockCount; r++) {
                const rx = -CONFIG.LANE_WIDTH / 2 + 1 + _rand() * (CONFIG.LANE_WIDTH - 2);
                const rMat = _rockMats[Math.floor(_rand() * _rockMats.length)];
                const rw = 0.18 + _rand() * 0.22;
                const rh = 0.10 + _rand() * 0.14;
                const rd = 0.16 + _rand() * 0.20;
                const rock = new THREE.Mesh(new THREE.SphereGeometry(rw * 0.7, 7, 5), rMat);
                rock.scale.set(1.0, rh / (rw * 0.7), rd / (rw * 0.7));
                rock.position.set(rx, CONFIG.LANE_HEIGHT / 2 + rh * 0.3, lane.z + (_rand() - 0.5) * 0.35);
                rock.rotation.y = _rand() * Math.PI;
                rock.castShadow = true;
                rock.receiveShadow = true;
                scene.add(rock);
                lane.meshes.push(rock);
            }

            // Scatter tiny wildflowers
            if (!adjacentToWater && _rand() > 0.4) {
                const flowerCount = 2 + Math.floor(_rand() * 4);
                for (let f = 0; f < flowerCount; f++) {
                    const fx = -CONFIG.LANE_WIDTH / 2 + 1 + _rand() * (CONFIG.LANE_WIDTH - 2);
                    const fz = lane.z + (_rand() - 0.5) * 0.3;
                    const fc = _flowerColors[Math.floor(_rand() * _flowerColors.length)];
                    const stemMat = new THREE.MeshStandardMaterial({ color: 0x336622, roughness: 0.9 });
                    const petalMat = new THREE.MeshStandardMaterial({ color: fc, roughness: 0.75 });
                    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.22, 5), stemMat);
                    stem.position.set(fx, CONFIG.LANE_HEIGHT / 2 + 0.11, fz);
                    stem.castShadow = false;
                    scene.add(stem);
                    lane.meshes.push(stem);
                    const petal = new THREE.Mesh(new THREE.SphereGeometry(0.065, 6, 5), petalMat);
                    petal.position.set(fx, CONFIG.LANE_HEIGHT / 2 + 0.26, fz);
                    scene.add(petal);
                    lane.meshes.push(petal);
                }
            }

            // Skip trees on water-adjacent lanes
            if (adjacentToWater) return;

            // 1–2 richly detailed trees — no two within 2 units of each other
            lane.trees = lane.trees || [];
            const treeCount = 1 + Math.floor(_rand() * 2);
            for (let i = 0; i < treeCount; i++) {
                let treeX, attempts = 0;
                do {
                    treeX = -CONFIG.LANE_WIDTH / 2 + 1.5 + _rand() * (CONFIG.LANE_WIDTH - 3);
                    attempts++;
                } while (
                    attempts < 20 &&
                    lane.trees.some(tx => Math.abs(treeX - tx) < 2.0)
                );
                // Only place if we found a valid gap
                if (!lane.trees.some(tx => Math.abs(treeX - tx) < 2.0)) {
                    lane.trees.push(treeX);
                    const treeGroup = _buildThemeDecoration(treeX, lane.z);
                    scene.add(treeGroup);
                    lane.meshes.push(treeGroup);
                }
            }
        }

        // ============================================================================
        // REALISTIC CAR BUILDER
        // Cars drive along X axis. Body length = X, width = Z.
        // direction: +1 = moving right (+X), -1 = moving left (-X)
        // ============================================================================
        function buildCarMesh(color, direction) {
            const group = new THREE.Group();
            const bodyColor = new THREE.Color(color);

            // Randomly make some vehicles larger (SUV / van)
            const isLarge = Math.random() > 0.65;
            const bW = isLarge ? 1.75 : 1.38; // body length along X
            const bH = isLarge ? 0.42 : 0.36; // body height
            const bD = isLarge ? 0.90 : 0.82; // body depth along Z

            // ── Lower body ─────────────────────────────────────────────────────
            const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.55, metalness: 0.25 });
            const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(bW, bH, bD), bodyMat);
            bodyMesh.position.y = 0.22 + bH / 2;
            bodyMesh.castShadow = true;
            bodyMesh.receiveShadow = true;
            group.add(bodyMesh);

            // ── Cabin (roof section, slightly darker) ──────────────────────────
            const cabinColor = bodyColor.clone().multiplyScalar(0.80);
            const cabinW = bW * 0.56;
            const cabinH = 0.30;
            const cabinD = bD * 0.80;
            // Shift cabin slightly toward the rear of the car
            const cabinX = direction * bW * -0.06;
            const cabinY = 0.22 + bH + cabinH / 2;
            const cabinMat = new THREE.MeshStandardMaterial({ color: cabinColor, roughness: 0.5, metalness: 0.2 });
            const cabinMesh = new THREE.Mesh(new THREE.BoxGeometry(cabinW, cabinH, cabinD), cabinMat);
            cabinMesh.position.set(cabinX, cabinY, 0);
            cabinMesh.castShadow = true;
            group.add(cabinMesh);

            // ── Tinted windows (front & rear of cabin) ─────────────────────────
            const glassMat = new THREE.MeshStandardMaterial({
                color: 0x224466, transparent: true, opacity: 0.75, roughness: 0.05, metalness: 0.4
            });
            const glassGeom = new THREE.BoxGeometry(0.05, cabinH * 0.78, cabinD * 0.84);
            // Front windshield (toward direction of travel)
            const fGlass = new THREE.Mesh(glassGeom, glassMat);
            fGlass.position.set(cabinX + direction * (cabinW * 0.5 + 0.01), cabinY, 0);
            group.add(fGlass);
            // Rear window
            const rGlass = new THREE.Mesh(glassGeom, glassMat);
            rGlass.position.set(cabinX - direction * (cabinW * 0.5 + 0.01), cabinY, 0);
            group.add(rGlass);
            // Side windows (left & right)
            const sideGlassGeom = new THREE.BoxGeometry(cabinW * 0.78, cabinH * 0.72, 0.04);
            [-1, 1].forEach(side => {
                const sg = new THREE.Mesh(sideGlassGeom, glassMat);
                sg.position.set(cabinX, cabinY, side * (cabinD * 0.5 + 0.01));
                group.add(sg);
            });

            // ── Wheels + hubcaps ───────────────────────────────────────────────
            const wheelR = 0.17;
            const wheelThick = 0.13;
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const hubMat  = new THREE.MeshStandardMaterial({ color: 0xAAAAAA, metalness: 0.85, roughness: 0.2 });
            // rotation.x = π/2 makes cylinder axis point along Z → wheel rolls along X ✓
            const wheelGeom = new THREE.CylinderGeometry(wheelR, wheelR, wheelThick, 14);
            const hubGeom   = new THREE.CylinderGeometry(wheelR * 0.5, wheelR * 0.5, wheelThick + 0.01, 8);

            const axleXF =  direction * bW * 0.36;  // front axle
            const axleXR = -direction * bW * 0.36;  // rear axle
            const axleZ  = bD / 2 + wheelThick / 2 + 0.01; // wheels stick out past body

            [[axleXF, axleZ], [axleXF, -axleZ], [axleXR, axleZ], [axleXR, -axleZ]].forEach(([wx, wz]) => {
                const w = new THREE.Mesh(wheelGeom, wheelMat);
                w.rotation.x = Math.PI / 2;
                w.position.set(wx, wheelR, wz);
                w.castShadow = true;
                group.add(w);
                const h = new THREE.Mesh(hubGeom, hubMat);
                h.rotation.x = Math.PI / 2;
                h.position.set(wx, wheelR, wz);
                group.add(h);
            });

            // ── Headlights (front face, direction of travel) ───────────────────
            const hlMat = new THREE.MeshStandardMaterial({
                color: 0xFFFFCC, emissive: 0xFFEE88, emissiveIntensity: 1.2, roughness: 0.1
            });
            const hlGeom = new THREE.BoxGeometry(0.07, 0.11, 0.17);
            const frontX = direction * (bW / 2 + 0.01);
            const lightY = 0.22 + bH * 0.55;
            [-0.24, 0.24].forEach(lz => {
                const hl = new THREE.Mesh(hlGeom, hlMat);
                hl.position.set(frontX, lightY, lz);
                group.add(hl);
            });

            // ── Taillights (rear face) ─────────────────────────────────────────
            const tlMat = new THREE.MeshStandardMaterial({
                color: 0xCC1100, emissive: 0xFF2200, emissiveIntensity: 0.9, roughness: 0.15
            });
            const tlGeom = new THREE.BoxGeometry(0.07, 0.10, 0.16);
            const rearX = -direction * (bW / 2 + 0.01);
            [-0.22, 0.22].forEach(lz => {
                const tl = new THREE.Mesh(tlGeom, tlMat);
                tl.position.set(rearX, lightY, lz);
                group.add(tl);
            });

            // ── Front bumper ───────────────────────────────────────────────────
            const bumperMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5 });
            const bumperMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.14, bD * 0.88), bumperMat);
            bumperMesh.position.set(frontX, 0.25, 0);
            group.add(bumperMesh);

            return group;
        }

        function createRoadLane(lane, levelConfig) {
            // Asphalt surface — slightly worn dark tone
            const roadMat = new THREE.MeshStandardMaterial({ color: (_currentTheme && _currentTheme.road) || 0x252525, roughness: 0.9, metalness: 0.0 });
            const road = new THREE.Mesh(
                new THREE.BoxGeometry(CONFIG.LANE_WIDTH, CONFIG.LANE_HEIGHT, CONFIG.LANE_DEPTH),
                roadMat
            );
            road.position.set(0, 0, lane.z);
            road.receiveShadow = true;
            scene.add(road);
            lane.meshes.push(road);

            // White edge lines
            const edgeMat = new THREE.MeshStandardMaterial({ color: 0xddddcc, roughness: 0.9, metalness: 0.0 });
            [-1, 1].forEach(side => {
                const edge = new THREE.Mesh(new THREE.BoxGeometry(CONFIG.LANE_WIDTH, 0.03, 0.10), edgeMat);
                edge.position.set(0, CONFIG.LANE_HEIGHT / 2 + 0.015, lane.z + side * 0.42);
                scene.add(edge);
                lane.meshes.push(edge);
            });

            // Yellow dashed center line
            const dashMat = new THREE.MeshStandardMaterial({ color: 0xFFCC22, roughness: 0.9, metalness: 0.0 });
            for (let i = -CONFIG.LANE_WIDTH / 2 + 0.75; i < CONFIG.LANE_WIDTH / 2; i += 1.5) {
                const dash = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.03, 0.38), dashMat);
                dash.position.set(i, CONFIG.LANE_HEIGHT / 2 + 0.015, lane.z);
                scene.add(dash);
                lane.meshes.push(dash);
            }

            // Cars — fixed count (2–3), only speed scales with difficulty
            const diff = getDifficulty(lane.index);
            const carCount = levelConfig ? levelConfig.carCount : (2 + Math.floor(_rand() * 2));
            const minSpeed = levelConfig ? levelConfig.speed * 30 : (1.5 + diff * 4.0);
            const maxSpeed = levelConfig ? levelConfig.speed * 30 : (2.5 + diff * 5.5);
            // Rich palette including metallic tones
            const carColors = [0xe74c3c, 0x3498db, 0x2ecc71, 0xf39c12, 0x9b59b6,
                               0xe67e22, 0x1abc9c, 0xe8e8e8, 0x2c3e50, 0xc0392b];
            // Road lanes come in pairs (p=2 & p=3 in the 9-lane cycle).
            // The second lane always goes the opposite direction to the first,
            // like a two-lane road with traffic going both ways.
            let laneDirection;
            if (levelConfig) {
                laneDirection = levelConfig.direction;
            } else {
                const _p = (lane.index - 10) % 9;
                if (_p === 3) {
                    // Second road lane — mirror the previous lane's direction
                    const prevRoad = gameState.lanes.find(l => l.index === lane.index - 1);
                    laneDirection = (prevRoad && prevRoad.cars.length > 0)
                        ? -prevRoad.cars[0].direction
                        : (_rand() > 0.5 ? 1 : -1);
                } else {
                    laneDirection = _rand() > 0.5 ? 1 : -1;
                }
            }
            for (let i = 0; i < carCount; i++) {
                const car = {
                    x: -CONFIG.LANE_WIDTH / 2 + _rand() * CONFIG.LANE_WIDTH,
                    z: lane.z,
                    laneIndex: lane.index,
                    speed: minSpeed + _rand() * (maxSpeed - minSpeed),
                    direction: laneDirection,
                    color: carColors[Math.floor(_rand() * carColors.length)],
                };

                const carGroup = buildCarMesh(car.color, car.direction);
                carGroup.position.set(car.x, 0, car.z);
                scene.add(carGroup);

                car.mesh = carGroup;
                lane.cars.push(car);
                gameState.cars.push(car);
            }
            addTunnelEntrances(lane);
        }

        // ============================================================================
        // TUNNEL ENTRANCES — arched openings on both sides of road & water lanes
        // ============================================================================
        function addTunnelEntrances(lane) {
            const z = lane.z;
            const isWater = lane.type === 'water';
            const stoneMat = new THREE.MeshStandardMaterial({
                color: isWater ? 0x3d5c3a : 0x555555,
                roughness: 0.92, metalness: 0.05
            });
            // Slightly lighter keystone at arch crown
            const keystoneMat = new THREE.MeshStandardMaterial({
                color: isWater ? 0x527a4e : 0x686868,
                roughness: 0.85, metalness: 0.06
            });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x080808 });

            const openZ   = 1.5;          // opening width along Z
            const openH   = 1.3;          // opening height (spring line)
            const pillarW = 0.9;          // pillar thickness along Z
            const wallH   = 2.2;          // total wall height
            const wallD   = 1.0;          // wall thickness along X
            const archR   = openZ / 2;    // semicircular arch radius

            [-1, 1].forEach(side => {
                const bx = side * CONFIG.LANE_WIDTH / 2;

                // Dark interior — only as tall as the opening
                const interior = new THREE.Mesh(
                    new THREE.BoxGeometry(wallD + 0.6, openH, openZ - 0.04),
                    darkMat
                );
                interior.position.set(bx, openH / 2, z);
                scene.add(interior);
                lane.meshes.push(interior);

                // Left pillar (full height — arch sits on top)
                const lp = new THREE.Mesh(
                    new THREE.BoxGeometry(wallD, wallH, pillarW), stoneMat
                );
                lp.position.set(bx, wallH / 2, z - openZ / 2 - pillarW / 2);
                lp.castShadow = true; scene.add(lp); lane.meshes.push(lp);

                // Right pillar
                const rp = new THREE.Mesh(
                    new THREE.BoxGeometry(wallD, wallH, pillarW), stoneMat
                );
                rp.position.set(bx, wallH / 2, z + openZ / 2 + pillarW / 2);
                rp.castShadow = true; scene.add(rp); lane.meshes.push(rp);

                // Top cap — flat stone slab covering above the opening
                const cap = new THREE.Mesh(
                    new THREE.BoxGeometry(wallD, wallH - openH, openZ),
                    stoneMat
                );
                cap.position.set(bx, openH + (wallH - openH) / 2, z);
                cap.castShadow = true;
                scene.add(cap);
                lane.meshes.push(cap);
            });
        }

        function createWaterLane(lane, levelConfig) {
            // Deep river bed underneath water
            const bedMat = new THREE.MeshStandardMaterial({ color: 0x1a2e18, roughness: 0.98, metalness: 0.0 });
            const bed = new THREE.Mesh(new THREE.BoxGeometry(CONFIG.LANE_WIDTH, 0.55, CONFIG.LANE_DEPTH), bedMat);
            bed.position.set(0, -0.38, lane.z);
            bed.receiveShadow = true;
            scene.add(bed);
            lane.meshes.push(bed);

            // Water surface — deep teal with high specular shimmer
            const _wc = (_currentTheme && _currentTheme.water) || 0x0a6688;
            const waterMat = new THREE.MeshStandardMaterial({
                color: _wc,
                transparent: true,
                opacity: 0.82,
                roughness: 0.08,
                metalness: 0.18,
                emissive: new THREE.Color(_wc).multiplyScalar(0.35),
                emissiveIntensity: 0.18,
            });
            const water = new THREE.Mesh(
                new THREE.PlaneGeometry(CONFIG.LANE_WIDTH, CONFIG.LANE_DEPTH, 1, 1),
                waterMat
            );
            water.rotation.x = -Math.PI / 2;
            water.position.set(0, 0.02, lane.z);
            water.receiveShadow = true;
            water.userData.isWater = true;
            water.userData.waveOffset = _rand() * Math.PI * 2;
            scene.add(water);
            _waterObjects.push(water);
            lane.meshes.push(water);


            // Logs — fixed count and size, only speed scales with difficulty
            const wDiff = getDifficulty(lane.index);
            const logGroupCount = levelConfig ? levelConfig.logCount : 3;
            const logMinSpeed = levelConfig ? levelConfig.speed * 30 : (0.7 + wDiff * 2.3);
            const logMaxSpeed = levelConfig ? levelConfig.speed * 30 : (1.3 + wDiff * 3.2);
            // Space groups evenly so there are always reachable gaps
            const spacing = CONFIG.LANE_WIDTH / (logGroupCount + 1);

            for (let g = 0; g < logGroupCount; g++) {
                const groupX = -CONFIG.LANE_WIDTH / 2 + spacing * (g + 1);
                const speed = logMinSpeed + _rand() * (logMaxSpeed - logMinSpeed);
                const direction = levelConfig ? levelConfig.direction : (_rand() > 0.5 ? 1 : -1);

                const logGroup = {
                    x: groupX,
                    z: lane.z,
                    laneIndex: lane.index,
                    speed: speed,
                    direction: direction,
                    logs: [],
                    meshes: [],
                };

                // Fixed 2–3 logs per group (never shrinks)
                const logsPerGroup = 2 + Math.floor(_rand() * 2);
                for (let l = 0; l < logsPerGroup; l++) {
                    const logOffset = (l - (logsPerGroup - 1) / 2) * 1.2;
                    // Bark color varies slightly per log
                    const barkR = 0.50 + _rand() * 0.18;
                    const barkG = 0.26 + _rand() * 0.10;
                    const barkB = 0.10 + _rand() * 0.06;
                    const logMat = new THREE.MeshStandardMaterial({
                        color: new THREE.Color(barkR, barkG, barkB),
                        roughness: 0.97, metalness: 0.0
                    });
                    const endMat = new THREE.MeshStandardMaterial({
                        color: new THREE.Color(barkR * 0.52, barkG * 0.52, barkB * 0.52),
                        roughness: 0.99, metalness: 0.0
                    });
                    const logGeom = new THREE.CylinderGeometry(CONFIG.LOG_RADIUS, CONFIG.LOG_RADIUS * 1.04, CONFIG.LOG_LENGTH, 10);
                    const logMesh = new THREE.Mesh(logGeom, logMat);
                    logMesh.rotation.z = Math.PI / 2;
                    logMesh.position.set(groupX + logOffset, 0.25, lane.z);
                    logMesh.userData.offsetX = logOffset;
                    logMesh.castShadow = true;
                    logMesh.receiveShadow = true;

                    // End caps — cylinder axis is local Y, so caps sit at ±Y, face along X rotation
                    const ringColors = [
                        new THREE.Color(barkR * 0.42, barkG * 0.38, barkB * 0.28),
                        new THREE.Color(barkR * 0.58, barkG * 0.52, barkB * 0.38),
                        new THREE.Color(barkR * 0.72, barkG * 0.64, barkB * 0.46),
                    ];
                    [-1, 1].forEach(end => {
                        const yPos = end * (CONFIG.LOG_LENGTH / 2 + 0.003);
                        const rotX  = end === 1 ? -Math.PI / 2 : Math.PI / 2;

                        // Base cap face
                        const capFace = new THREE.Mesh(
                            new THREE.CircleGeometry(CONFIG.LOG_RADIUS * 1.04, 12),
                            endMat
                        );
                        capFace.rotation.x = rotX;
                        capFace.position.set(0, yPos, 0);
                        logMesh.add(capFace);

                        // Growth rings (3 concentric discs, tiny Y offset to avoid z-fighting)
                        [CONFIG.LOG_RADIUS * 0.72, CONFIG.LOG_RADIUS * 0.44, CONFIG.LOG_RADIUS * 0.18].forEach((r, i) => {
                            const ring = new THREE.Mesh(
                                new THREE.CircleGeometry(r, 12),
                                new THREE.MeshStandardMaterial({ color: ringColors[i], roughness: 0.99 })
                            );
                            ring.rotation.x = rotX;
                            ring.position.set(0, yPos + end * (i + 1) * 0.002, 0);
                            logMesh.add(ring);
                        });
                    });

                    scene.add(logMesh);
                    logGroup.meshes.push(logMesh);
                }

                lane.logs.push(logGroup);
                gameState.logs.push(logGroup);
            }
            addTunnelEntrances(lane);
        }

        // ============================================================================
        // LANE MANAGEMENT
        // ============================================================================
        function generateLanes() {
            // Generate until we have GENERATION_DISTANCE lanes strictly AHEAD of the player.
            const targetZ = (player ? player.position.z : 0) - CONFIG.GENERATION_DISTANCE;
            while (
                gameState.lanes.length === 0 ||
                gameState.lanes[gameState.lanes.length - 1].z > targetZ
            ) {
                const lane = createLane(gameState.nextLaneIndex);
                gameState.lanes.push(lane);
                gameState.nextLaneIndex++;
            }
        }

        function removeFarLanes() {
            while (gameState.lanes.length > 0 && gameState.lanes[0].z > player.position.z + CONFIG.REMOVAL_DISTANCE) {
                const lane = gameState.lanes.shift();
                lane.meshes.forEach(m => {
                    const idx = _waterObjects.indexOf(m);
                    if (idx !== -1) _waterObjects.splice(idx, 1);
                    scene.remove(m);
                });
                lane.cars.forEach(car => {
                    scene.remove(car.mesh);
                    gameState.cars = gameState.cars.filter(c => c !== car);
                });
                lane.logs.forEach(logGroup => {
                    logGroup.meshes.forEach(m => scene.remove(m));
                    gameState.logs = gameState.logs.filter(l => l !== logGroup);
                });
            }
        }

        function trimAheadLanes() {
            // Removes lanes too far AHEAD of the player (from the end of the array)
            const minZ = player.position.z - CONFIG.GENERATION_DISTANCE;
            while (gameState.lanes.length > 0 && gameState.lanes[gameState.lanes.length - 1].z < minZ) {
                const lane = gameState.lanes.pop();
                lane.meshes.forEach(m => {
                    const idx = _waterObjects.indexOf(m);
                    if (idx !== -1) _waterObjects.splice(idx, 1);
                    scene.remove(m);
                });
                lane.cars.forEach(car => {
                    scene.remove(car.mesh);
                    gameState.cars = gameState.cars.filter(c => c !== car);
                });
                lane.logs.forEach(logGroup => {
                    logGroup.meshes.forEach(m => scene.remove(m));
                    gameState.logs = gameState.logs.filter(l => l !== logGroup);
                });
                gameState.nextLaneIndex--;
            }
        }

        // ============================================================================
        // MOVEMENT
        // ============================================================================
        function movePlayer(direction) {
            if (gameState.playerIsHopping || gameState.isDead) return;

            let newX = gameState.playerPos.x;
            let newZ = gameState.playerPos.z;

            if (direction === 'forward') {
                newZ -= 1;
            } else if (direction === 'back') {
                newZ += 1;
            } else if (direction === 'left') {
                newX -= 1;
            } else if (direction === 'right') {
                newX += 1;
            }

            // Side boundary — can't go off left/right edges of the lanes
            if (Math.abs(newX) > CONFIG.LANE_WIDTH / 2 - 0.5) return;
            // Back boundary — can't retreat behind the starting position (Z = 0)
            if (newZ > 0) return;
            // Back boundary — can't step onto a lane that has already been removed
            if (direction === 'back') {
                const targetLane = gameState.lanes.find(l => Math.abs(l.z - newZ) < 0.5);
                if (!targetLane) return;
            }
            // Tree collision — trees are solid, block movement into their cell
            const treeLane = gameState.lanes.find(l => Math.abs(l.z - newZ) < 0.5);
            if (treeLane && treeLane.trees && treeLane.trees.some(tx => Math.abs(tx - newX) < 0.45)) return;

            // Duck/frog glide when swimming freely in water, but hop normally when on a log
            const movingLane = gameState.lanes.find(l => Math.abs(l.z - gameState.playerPos.z) < 0.5);
            const currentlyOnLog = (selectedSkin === 'duck' && gameState.duckOnLog) ||
                                   (selectedSkin === 'frog' && gameState.frogOnLog);
            const floaterInWater = (selectedSkin === 'duck' || selectedSkin === 'frog') &&
                                   movingLane && movingLane.type === 'water' && !currentlyOnLog;

            gameState.isGliding = floaterInWater;
            gameState.hopStartedFromWater = floaterInWater; // track so frog can't swim onto a log
            if (gameState.isLevelMode && !gameState.levelTimerRunning) {
                gameState.levelTimerRunning = true;
                gameState.levelStartTime = Date.now();
            }
            gameState.playerIsHopping = true;
            gameState.hopStartTime = Date.now();
            gameState.hopStartPos = { x: player.position.x, y: player.position.y, z: player.position.z };
            gameState.hopDirection = direction;
            gameState.playerPos.x = newX;
            gameState.playerPos.z = newZ;

            // Coin collection (level mode)
            if (gameState.isLevelMode && gameState.levelCoins) {
                gameState.levelCoins.forEach(coin => {
                    if (!coin.userData.collected &&
                        Math.abs(coin.position.x - newX) < 0.7 &&
                        Math.abs(coin.position.z - newZ) < 0.7) {
                        coin.userData.collected = true;
                        coin.visible = false;
                        gameState.coinsCollected++;
                        updateLevelCoinHud();
                        playCoinSound();
                        spawnCoinParticles(coin.position.x, coin.position.y, coin.position.z);
                    }
                });
            }
            // Finish line detection (level mode)
            if (gameState.isLevelMode && newZ <= gameState.levelFinishZ) {
                setTimeout(levelComplete, 300); // slight delay so hop animation finishes
            }

            // Face direction
            if (direction === 'forward') player.rotation.y = 0;
            else if (direction === 'back') player.rotation.y = Math.PI;
            else if (direction === 'left') player.rotation.y = Math.PI / 2;
            else if (direction === 'right') player.rotation.y = -Math.PI / 2;

            if (!floaterInWater) playHopSound();
        }

        // ============================================================================
        // HOP ANIMATION
        // ============================================================================
        function updatePlayerHop() {
            if (!gameState.playerIsHopping) return;

            const elapsed = (Date.now() - gameState.hopStartTime) / 1000;
            const progress = Math.min(elapsed / CONFIG.HOP_DURATION, 1);

            if (progress >= 1) {
                gameState.playerIsHopping = false;
                gameState.hopJustCompleted = true;
                player.position.x = gameState.playerPos.x;
                // Land at water level if duck/frog floating, else normal height
                const landingLane = gameState.lanes ? gameState.lanes.find(l => Math.abs(l.z - gameState.playerPos.z) < 0.5) : null;
                const landingInWater = landingLane && landingLane.type === 'water';

                // Chime when player lands on safe/grass lane coming from water (cleared the river)
                const landingOnSafe = landingLane && landingLane.type === 'safe';
                if (landingOnSafe && gameState.hopDirection === 'forward') {
                    const prevLane = gameState.lanes.find(l => Math.abs(l.z - (gameState.playerPos.z + 1)) < 0.5);
                    if (prevLane && prevLane.type === 'water') playChimeSound();
                }
                const isFloater = selectedSkin === 'duck' || selectedSkin === 'frog';
                // Open boarding window only if the frog wasn't already diving under a log.
                // If it was diving, keep it submerged so hopping under a log doesn't pop it on top.
                if (landingInWater && selectedSkin === 'frog' && !gameState.frogDiving) {
                    gameState.frogLandedUntil = Date.now() + 380;
                }
                // Frog stays submerged if it moved while diving under a log
                if (landingInWater && isFloater) {
                    if (selectedSkin === 'frog' && gameState.frogDiving) {
                        // keep current y — updatePlayerVisuals handles the submerged position
                    } else {
                        player.position.y = selectedSkin === 'duck' ? 0.30 : 0.05;
                    }
                } else {
                    // Per-skin land height — smaller/larger animals sit at different heights
                    const _landY = { duck:0.33, frog:0.20, bunny:0.30, chicken:0.33, fox:0.40, bear:0.72 };
                    player.position.y = _landY[selectedSkin] ?? 0.33;
                }
                player.position.z = gameState.playerPos.z;

                if (gameState.hopDirection === 'forward') {
                    const landedLane = gameState.lanes.find(l => Math.abs(l.z - gameState.playerPos.z) < 0.5);
                    if (landedLane) {
                        gameState.lastLaneType = landedLane.type;
                    }
                }

                gameState.cameraTarget.x = gameState.playerPos.x;
                gameState.cameraTarget.z = gameState.playerPos.z;

                return;
            }

            if (gameState.isGliding) {
                // Floater water glide — smooth horizontal movement, y stays at start height
                // (checkCollisions sets the correct y on landing — log height or water level)
                const ease = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
                player.position.x = gameState.hopStartPos.x + (gameState.playerPos.x - gameState.hopStartPos.x) * ease;
                player.position.z = gameState.hopStartPos.z + (gameState.playerPos.z - gameState.hopStartPos.z) * ease;
                player.position.y = gameState.hopStartPos.y;
            } else {
                // Normal hop arc using sine curve
                const heightMult = Math.sin(progress * Math.PI);
                const hopHeight = heightMult * CONFIG.HOP_PEAK_HEIGHT;

                player.position.x = gameState.hopStartPos.x + (gameState.playerPos.x - gameState.hopStartPos.x) * progress;
                player.position.y = gameState.hopStartPos.y + hopHeight;
                player.position.z = gameState.hopStartPos.z + (gameState.playerPos.z - gameState.hopStartPos.z) * progress;
            }
        }

        // ============================================================================
        // COLLISION DETECTION
        // ============================================================================
        function checkCollisions(deltaTime) {
            const playerX = player.position.x;
            const playerZ = player.position.z;

            // Check cars
            for (let car of gameState.cars) {
                const dist = Math.abs(car.x - playerX);
                if (dist < (CONFIG.CAR_WIDTH + CONFIG.PLAYER_SIZE) / 2 &&
                    Math.abs(car.z - playerZ) < 0.5) {
                    killPlayer('squish');
                    return;
                }
            }

            // Find current lane
            let currentLane = null;
            for (let lane of gameState.lanes) {
                if (Math.abs(lane.z - playerZ) < 0.5) {
                    currentLane = lane;
                    break;
                }
            }

            // Check water — only when player has fully landed (not mid-hop)
            if (currentLane && currentLane.type === 'water' && !gameState.playerIsHopping) {
                const canFloat = (selectedSkin === 'duck' || selectedSkin === 'frog');

                let onLog = false;
                let logNearbyThisFrame = false;

                for (let logGroup of currentLane.logs) {
                    for (let mesh of logGroup.meshes) {
                        const catchRadius = CONFIG.LOG_LENGTH / 2 + CONFIG.PLAYER_SIZE / 2;
                        const dist = Math.abs(mesh.position.x - playerX);
                        if (dist < catchRadius) {
                            if (selectedSkin === 'duck') {
                                // Duck: kill if it wasn't already riding and didn't just hop onto it
                                if (!gameState.hopJustCompleted && !gameState.duckOnLog) {
                                    killPlayer('logHit');
                                    return;
                                }
                                onLog = true;
                                gameState.duckOnLog = true;
                                const movement = logGroup.direction * logGroup.speed * deltaTime;
                                gameState.playerPos.x += movement;
                                player.position.x += movement;
                                // Snap on hop landing; smooth lerp when log drifts under
                                const duckLogLerp = gameState.hopJustCompleted ? 1.0 : 0.25;
                                player.position.y += (0.5 + CONFIG.LOG_RADIUS - player.position.y) * duckLogLerp;
                            } else if (selectedSkin === 'frog') {
                                // Can board if within the landing grace window (hopped from land) OR already riding
                                const withinLandingWindow = Date.now() < gameState.frogLandedUntil;
                                if (withinLandingWindow || (!gameState.frogDiving && gameState.frogOnLog)) {
                                    // Within boarding window from a land hop, or already riding
                                    onLog = true;
                                    gameState.frogOnLog = true;
                                    gameState.frogDiving = false;  // clear any lingering dive state
                                    gameState.frogDiveUntil = 0;
                                    const movement = logGroup.direction * logGroup.speed * deltaTime;
                                    gameState.playerPos.x += movement;
                                    player.position.x += movement;
                                    // Snap on hop landing; smooth lerp when log drifts under
                                    const frogLogLerp = gameState.hopJustCompleted ? 1.0 : 0.25;
                                    player.position.y += (0.5 + CONFIG.LOG_RADIUS - player.position.y) * frogLogLerp;
                                } else {
                                    // Log drifted into frog, or frog is already diving — stay under
                                    logNearbyThisFrame = true;
                                    gameState.frogDiveUntil = Date.now();
                                    gameState.frogDiving = true;
                                }
                            } else {
                                // Non-floater riding a log
                                onLog = true;
                                const movement = logGroup.direction * logGroup.speed * deltaTime;
                                gameState.playerPos.x += movement;
                                player.position.x += movement;
                                const logLerp = gameState.hopJustCompleted ? 1.0 : 0.25;
                                player.position.y += (0.5 + CONFIG.LOG_RADIUS - player.position.y) * logLerp;
                            }
                            break;
                        }
                    }
                    if (onLog || logNearbyThisFrame) break;
                }

                // Sustain frogDiving through the grace period so the rise is smooth
                if (selectedSkin === 'frog' && !logNearbyThisFrame) {
                    gameState.frogDiving = Date.now() < gameState.frogDiveUntil;
                }

                // Clear riding state when animal is no longer on a log
                if (!onLog && selectedSkin === 'duck') gameState.duckOnLog = false;
                if (!onLog && selectedSkin === 'frog') gameState.frogOnLog = false;

                // Clear hop flag after log check
                gameState.hopJustCompleted = false;

                if (!onLog) {
                    if (canFloat) {
                        // Duck: set y directly (no lerp needed)
                        // Frog: y is fully owned by updatePlayerVisuals so it can lerp smoothly
                        if (selectedSkin === 'duck') {
                            player.position.y = -0.10 + Math.sin(Date.now() * 0.004) * 0.03;
                        }
                        // frog y intentionally not set here — updatePlayerVisuals handles it
                    } else {
                        killPlayer('sink');
                        return;
                    }
                }
            }

            // If log carries player to tunnel entrance, clamp position — no death
            // Keep duckOnLog/frogOnLog true so the log-hit kill check doesn't fire
            if (currentLane && currentLane.type === 'water') {
                const tunnelEdge = CONFIG.LANE_WIDTH / 2 - 1.0;
                if (Math.abs(player.position.x) > tunnelEdge) {
                    player.position.x = Math.sign(player.position.x) * tunnelEdge;
                    gameState.playerPos.x = player.position.x;
                    // intentionally NOT clearing duckOnLog/frogOnLog — prevents logHit death
                }
            }

            // Check if fell behind camera
            const cameraTargetZ = player.position.z + CONFIG.CAMERA_OFFSET.z;
            if (player.position.z > cameraTargetZ + 8) {
                killPlayer('fell');
                return;
            }
        }

        function getDeathMessage(reason) {
            if (reason === 'squish') return '🚗 You got hit!';
            if (reason === 'logHit') return '🪵 You got hit!';
            if (reason === 'sink')   return '💧 You drowned!';
            if (reason === 'swept')  return '🌊 You got swept away!';
            if (reason === 'fell')   return '📷 You got left behind!';
            return '💀 You got hit!';
        }

        function killPlayer(reason) {
            if (gameState.isDead) return; // prevent double-kill
            gameState.isDead = true;
            gameState.isPlaying = false;

            if (reason === 'squish') {
                animatePlayerDeath('squish');
            } else if (reason === 'sink' || reason === 'swept') {
                animatePlayerDeath('sink');
            }

            playDeathSound();

            // Show game over screen — player clicks Main Menu to leave
            setTimeout(() => {
                showGameOverScreen(reason);
            }, 600);
        }

        function animatePlayerDeath(type) {
            if (type === 'squish') {
                const s = player.scale.x; // respect current base scale
                player.scale.set(s, s * 0.07, s);
            } else if (type === 'sink') {
                player.position.y -= 2;
            }
        }


        // ============================================================================
        // UPDATE CARS AND LOGS
        // ============================================================================
        function updateWorldObjects(deltaTime) {
            // Update cars
            for (let car of gameState.cars) {
                car.x += car.direction * car.speed * deltaTime;
                car.mesh.position.x = car.x;

                // Wrap around
                if (car.x > CONFIG.LANE_WIDTH / 2 + 5) {
                    car.x = -CONFIG.LANE_WIDTH / 2 - 5;
                } else if (car.x < -CONFIG.LANE_WIDTH / 2 - 5) {
                    car.x = CONFIG.LANE_WIDTH / 2 + 5;
                }
            }

            // Update logs
            for (let logGroup of gameState.logs) {
                const dx = logGroup.direction * logGroup.speed * deltaTime;
                logGroup.x += dx;

                // Move every mesh by the same delta so relative offsets are preserved
                logGroup.meshes.forEach(mesh => {
                    mesh.position.x += dx;
                });

                // Wrap around — also shift all meshes
                let wrapDx = 0;
                if (logGroup.x > CONFIG.LANE_WIDTH / 2 + 6) {
                    wrapDx = -(CONFIG.LANE_WIDTH + 12);
                } else if (logGroup.x < -CONFIG.LANE_WIDTH / 2 - 6) {
                    wrapDx = (CONFIG.LANE_WIDTH + 12);
                }
                if (wrapDx !== 0) {
                    logGroup.x += wrapDx;
                    logGroup.meshes.forEach(mesh => {
                        mesh.position.x += wrapDx;
                    });
                }
            }
        }

        // ============================================================================
        // PLAYER VISUALS — swimming animation for duck and frog
        // ============================================================================
        function updatePlayerVisuals() {
            if (!player || !gameState.isPlaying) return;

            const t = Date.now();
            const isFloater = selectedSkin === 'duck' || selectedSkin === 'frog';

            // Find current lane
            let currentLane = null;
            for (let lane of gameState.lanes) {
                if (Math.abs(lane.z - player.position.z) < 0.6) {
                    currentLane = lane;
                    break;
                }
            }

            const inWater = currentLane && currentLane.type === 'water';

            if (inWater && isFloater && !gameState.playerIsHopping) {
                if (selectedSkin === 'duck') {
                    if (gameState.duckOnLog) {
                        // On a log — stand upright, smoothly rise to log surface
                        player.position.y += (0.5 + CONFIG.LOG_RADIUS - player.position.y) * 0.18;
                        player.rotation.x += (0 - player.rotation.x) * 0.25;
                        player.rotation.z += (0 - player.rotation.z) * 0.25;
                    } else {
                        // Floating in water — smoothly lower back to water level, paddle
                        player.position.y += (0.30 - player.position.y) * 0.12;
                        player.rotation.z = Math.sin(t * 0.004) * 0.08;
                        player.rotation.x = -0.18;
                    }
                } else if (selectedSkin === 'frog') {
                    if (gameState.frogOnLog) {
                        // On a log — stand upright, do NOT touch position.y
                        player.rotation.x += (0 - player.rotation.x) * 0.25;
                        player.rotation.z += (0 - player.rotation.z) * 0.25;
                    } else if (gameState.frogDiving) {
                        // Log passing overhead — frog sinks straight down, no tilt
                        player.rotation.x += (0 - player.rotation.x) * 0.15;
                        player.rotation.z += (0 - player.rotation.z) * 0.15;
                        player.position.y += (-0.8 - player.position.y) * 0.2;
                    } else {
                        // Normal swim — frog smoothly rises back to surface after a dive
                        player.rotation.x += (-0.22 - player.rotation.x) * 0.05;
                        player.rotation.z = Math.sin(t * 0.005) * 0.07;
                        const targetY = 0.05 + Math.sin(t * 0.004) * 0.03;
                        player.position.y += (targetY - player.position.y) * 0.05;
                    }
                }
            } else if (!gameState.playerIsHopping) {
                // Not in water — smoothly reset rotation back to upright
                player.rotation.x += (0 - player.rotation.x) * 0.18;
                player.rotation.z += (0 - player.rotation.z) * 0.18;
            }
        }

        // ============================================================================
        // CAMERA UPDATE
        // ============================================================================
        function updateCamera() {
            if (gameState.firstPerson) {
                // First-person: eye at player head, look in the direction the player is facing.
                // player.rotation.y encodes facing direction — derive world-space forward vector from it.
                // While hopping, freeze eye height at where the hop started so the arc doesn't shake.
                // When idle, follow player.position.y so water level (duck sits lower) registers correctly.
                const baseY = gameState.playerIsHopping ? gameState.hopStartPos.y : player.position.y;
                const eyeY = baseY + 0.45;
                const facingX = -Math.sin(player.rotation.y);
                const facingZ = -Math.cos(player.rotation.y);
                camera.position.set(player.position.x, eyeY, player.position.z);
                camera.lookAt(
                    player.position.x + facingX * 100,
                    eyeY,
                    player.position.z + facingZ * 100
                );
                if (player) player.visible = false;
            } else {
                // Third-person: restore player mesh and fixed overhead angle
                if (player) player.visible = true;
                const lerpFactor = 0.12;
                camera.position.x += (player.position.x + CONFIG.CAMERA_OFFSET.x - camera.position.x) * lerpFactor;
                camera.position.z += (player.position.z + CONFIG.CAMERA_OFFSET.z - camera.position.z) * lerpFactor;
                camera.position.y = CONFIG.CAMERA_OFFSET.y;
                camera.rotation.set(CAMERA_3P_ROTATION.x, 0, 0);
            }
        }

        // ============================================================================
        // SCORING
        // ============================================================================
        function updateScore() {
            const distance = Math.floor(-player.position.z);
            if (distance > gameState.score) {
                const oldScore = gameState.score;
                gameState.score = distance;

                // (chime moved to river-crossing — see hop completion)

                document.getElementById('score').textContent = gameState.score;
            }
        }

        // ── Level system helpers ──────────────────────────────────────────────────
        function _getCollectedCoins(levelIndex) {
            try {
                const data = JSON.parse(localStorage.getItem('hopsterCollectedCoins') || '{}');
                return new Set(data[String(levelIndex)] || []);
            } catch(e) { return new Set(); }
        }
        function _saveCollectedCoins(levelIndex, indices) {
            try {
                const data = JSON.parse(localStorage.getItem('hopsterCollectedCoins') || '{}');
                data[String(levelIndex)] = [...indices];
                localStorage.setItem('hopsterCollectedCoins', JSON.stringify(data));
            } catch(e) {}
        }

        function _getUnlockedLevels() {
            try { return JSON.parse(localStorage.getItem('hopsterUnlockedLevels') || '[0]'); }
            catch(e) { return [0]; }
        }
        function _getLevelStars() {
            try { return JSON.parse(localStorage.getItem('hopsterLevelStars') || '[0,0,0]'); }
            catch(e) { return [0,0,0]; }
        }
        function _calcStars(coinsCollected, levelIndex) {
            const t = LEVELS[levelIndex].starThresholds;
            if (coinsCollected >= t[2]) return 3;
            if (coinsCollected >= t[1]) return 2;
            if (coinsCollected >= t[0]) return 1;
            return 0;
        }

        // ── Level theme application ────────────────────────────────────────────
        function applyLevelTheme(levelIndex) {
            const t = (levelIndex !== undefined && LEVELS[levelIndex])
                ? LEVELS[levelIndex].theme
                : null;
            _currentTheme = t;
            if (!t) return;

            // Fog
            if (scene.fog) {
                scene.fog.color.setHex(t.fog);
            }
            // Sky / background
            scene.background = new THREE.Color(t.fog);

            // Ambient light — dim it for dark levels, brighten for light ones
            const fogBrightness = ((t.fog >> 16 & 0xff) + (t.fog >> 8 & 0xff) + (t.fog & 0xff)) / 765;
            ambientLight.color.setHex(t.fog);
            ambientLight.intensity = 0.25 + fogBrightness * 0.35;

            // Hemisphere light — sky matches fog, ground matches first ground swatch
            hemisphereLight.color.setHex(t.fog);
            hemisphereLight.groundColor.setHex(t.ground[0]);
            hemisphereLight.intensity = 0.4 + fogBrightness * 0.3;
        }

        function showLevelSelect() {
            const unlocked = _getUnlockedLevels();
            const stars    = _getLevelStars();
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            LEVELS.forEach((lvl, i) => {
                const isUnlocked = unlocked.includes(i);

                card.className = 'lvlCard' + (isUnlocked ? '' : ' lvlLocked');
                card.innerHTML = `

                    <div style="font-size:20px;color:#ffd93d;font-weight:bold;">${lvl.name}</div>
                    <div style="font-size:48px;margin:6px 0;">${lvl.emoji}</div>
                    <div style="font-size:26px;letter-spacing:3px;">
                        ${[0,1,2].map(j => `<span style="color:${j<s?'#ffd93d':'#444'}">★</span>`).join('')}
                    </div>
                    ${!isUnlocked ? '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:52px;">🔒</div>' : ''}

            document.getElementById('menu').classList.add('hidden');
